<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOK DESIGNER</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg: #FCFAF9;
            --card: rgba(255, 255, 255, 0.95);
            --border: rgba(220, 205, 205, 0.6);
            --pink: #CD8B8B;
            --pink-glow: rgba(205, 139, 139, 0.4);
            --emerald: #A3BCA7;
            --slate: #8A7A7A;
            --text: #3D2D2D;
            --text-inverse: #FFFFFF;
            --status-free: #6E9477;
            --status-busy: #B56565;
            --status-lock: #978F8F;
            --status-pend: #B38600;
            --blur: blur(16px);
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.dark-theme {
            --bg: #1C1818;
            --card: rgba(43, 31, 31, 0.95);
            --border: rgba(90, 70, 70, 0.5);
            --pink: #D89898;
            --pink-glow: rgba(216, 152, 152, 0.3);
            --emerald: #8BB094;
            --slate: #B3AAAA;
            --text: #F4F0F0;
            --text-inverse: #FFFFFF;
            --status-free: #8BB094;
            --status-busy: #D89898;
            --status-lock: #DFD9D9;
            --status-pend: #D4AF37;
        }

        body.dark-theme .modal-box { background: #2A1F1F; }
        body.dark-theme .modal-input, body.dark-theme .modal-choice { background: #1C1818; color: #EFEBEB; border-color: rgba(120, 90, 90, 0.4); }
        body.dark-theme .modal-input:focus { background: #2A1F1F; }
        body.dark-theme .modal-btn.secondary { background: #1C1818; color: #EFEBEB; border: 1px solid var(--border); }
        body.dark-theme .slot-card.selected { background: #382525; }
        body.dark-theme .btn-bulk.cancel { background: #3A2A2A; color: #FFF; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(205, 139, 139, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(205, 139, 139, 0.04) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.4s var(--ease), color 0.4s var(--ease);
        }

        /* MODO ADMIN ROSA CHOQUE */
        body.admin-mode {
            --pink: #FF1493;
            --pink-glow: rgba(255, 20, 147, 0.4);
            box-shadow: inset 0 0 150px rgba(255, 20, 147, 0.25);
            background-color: rgba(255, 20, 147, 0.02);
            border: 5px solid #FF1493;
        }
        body.admin-mode #adminBadge { background: #FF1493; box-shadow: 0 0 20px rgba(255, 20, 147, 0.6); }
        body.admin-mode .slot-card { border-color: rgba(255, 20, 147, 0.3); }

        .app { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin: 35px 0; position: relative; }
        header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.6rem; letter-spacing: 5px; font-weight: 600; line-height: 1; color: var(--text); text-transform: uppercase; }
        #adminBadge { background: var(--pink); color: var(--text-inverse); padding: 5px 16px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px; margin-bottom: 12px; box-shadow: 0 4px 15px var(--pink-glow); display: none; animation: pulse 2s infinite; }
        #themeToggle { position: absolute; right: 0px; top: 0px; font-size: 1.4rem; background: transparent; border: none; cursor: pointer; outline: none; }
        .btn-lock { position: absolute; left: 0px; top: 0px; font-size: 1.2rem; background: transparent; border: none; cursor: pointer; outline: none; opacity: 0.6; display: flex; align-items: center; justify-content: center; color: var(--slate); }
        .btn-lock.active { color: var(--pink); font-size: 0.7rem; font-weight: 700; top: 5px; left: 5px; }

        .floating-wa { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); z-index: 1000; transition: transform 0.2s; }
        .view { animation: fadeIn 0.5s var(--ease); }
        .hidden { display: none !important; }

        .dash-grid { display: flex; overflow-x: auto; gap: 14px; padding: 10px 0 30px 0; scrollbar-width: none; }
        .day-box { min-width: 88px; background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 24px 10px; text-align: center; cursor: pointer; transition: all 0.3s var(--ease); flex-shrink: 0; box-shadow: 0 6px 20px rgba(0,0,0,0.03); backdrop-filter: var(--blur); }
        .day-box:hover { transform: translateY(-3px); border-color: var(--pink); }
        .day-box.active { background: var(--pink); border-color: var(--pink); color: var(--text-inverse); box-shadow: 0 10px 25px var(--pink-glow); }
        .day-box .dow { font-size: 0.65rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; color: var(--slate); }
        .day-box.active .dow { color: rgba(255,255,255,0.9); }
        .day-box .num { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; margin: 6px 0 2px 0; line-height: 1; }
        .day-box .month { font-size: 0.7rem; opacity: 0.8; color: var(--slate); }
        .day-dot { width: 5px; height: 5px; border-radius: 50%; margin: 10px auto 0; }
        .day-dot.busy { background: var(--pink); }
        .day-dot.free { background: var(--emerald); }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-bottom: 25px; }
        .btn-nav { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 14px; cursor: pointer; font-weight: 500; font-size: 0.8rem; transition: all 0.2s var(--ease); }
        #dateTitle { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--text); }

        .slot-card { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); padding: 18px 22px; border-radius: 20px; margin-bottom: 14px; cursor: pointer; transition: all 0.3s var(--ease); }
        .slot-time { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--text); padding-right: 22px; border-right: 1px dashed var(--border); margin-right: 22px; min-width: 65px; }
        .slot-body { flex: 1; }
        .slot-st { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .slot-cl { font-size: 0.85rem; color: var(--slate); margin-top: 5px; font-weight: 400; line-height: 1.4; }

        .c-free { color: var(--status-free); } .c-busy { color: var(--status-busy); } .c-lock { color: var(--status-lock); } .c-pend { color: var(--status-pend); }
        .b-free { border-left: 5px solid var(--status-free); } .b-busy { border-left: 5px solid var(--status-busy); } .b-lock { border-left: 5px solid var(--status-lock); } .b-pend { border-left: 5px solid var(--status-pend); }

        #loader { position: fixed; top: 0; left: -50%; width: 50%; height: 4px; background: var(--pink); z-index: 9000; display: none; animation: loadAnim 1.4s infinite; }
        .bulk-bar { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 12px 16px; gap: 12px; z-index: 999; box-shadow: 0 10px 40px rgba(0,0,0,0.08); align-items: center; }
        .btn-bulk { padding: 12px 22px; border-radius: 14px; border: none; cursor: pointer; font-weight: 500; }
        .btn-bulk.block { background: var(--pink); color: var(--text-inverse); } .btn-bulk.clear { background: var(--emerald); color: var(--text-inverse); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 32px; width: 100%; max-width: 390px; }
        .modal-input { width: 100%; background: #FAFAFA; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; outline: none; }
        .modal-btn { padding: 14px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 500; width: 100%; }
        .modal-btn.primary { background: var(--pink); color: var(--text-inverse); }
        .modal-btn.secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
        .modal-choice { padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: #FAFAFA; cursor: pointer; text-align: center; margin-bottom: 10px; font-weight: 500; }

        .whatsapp-btn { color: var(--emerald); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; font-weight: 600; font-size: 0.8rem; padding: 4px 8px; background: rgba(163, 188, 167, 0.15); border-radius: 8px; }
        .watermark-sig { position: fixed; bottom: 20px; left: 20px; font-family: 'Cormorant Garamond', serif; color: var(--text); opacity: 0.45; pointer-events: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes loadAnim { 0% { left: -50%; } 100% { left: 110%; } }
    </style>
</head>

<body>
    <div class="watermark-sig">Camila Alves<br><span style="font-family:Inter; font-size:0.5rem; letter-spacing:2px; font-weight:600;">GERENTE</span></div>

    <a href="https://wa.me/559296150540?text=Ol%C3%A1.%20Gostaria%20de%20informa%C3%A7%C3%B5es%20sobre%20os%20servi%C3%A7os" target="_blank" class="floating-wa">💬</a>
    <div id="loader"></div>

    <div class="app">
        <header>
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>
            <button id="admBtn" class="btn-lock" onclick="doAdminAuth()">🔒</button>
            <div id="adminBadge">MODO ADMINISTRADOR</div>
            <h1>LOOK<br><span style="font-family:Inter; font-size:1rem; letter-spacing:8px; font-weight:400; color:var(--slate); display:block; margin-top:5px;">DESIGNER</span></h1>
            <div id="statusIndicator"><span id="statusText">SINCRONIZANDO...</span><div id="statusBar"></div></div>
        </header>

        <div id="dashboard" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                <p id="dashTitle" style="font-size: 0.7rem; font-weight: 700; color: var(--slate); letter-spacing: 1px;">SELECIONE UMA DATA</p>
                <div id="historyBtnContainer" style="display:none;"><button onclick="toggleHistoryView()" class="btn-nav" style="padding: 4px 10px; font-size: 0.65rem;">VER HISTÓRICO (-7D)</button></div>
            </div>
            <div class="dash-grid" id="dayContainer"></div>
        </div>

        <div id="agenda" class="view hidden">
            <div class="header-bar"><button class="btn-nav" onclick="closeAgenda()">←</button><h3 id="dateTitle">DATA</h3><div id="admStatus" style="display:none;"><button class="btn-nav" id="btnMulti" onclick="toggleMultiSelect()" style="font-size:0.6rem;">MULTI: OFF</button></div><div id="headerSpacer" style="width:60px;"></div></div>
            <div id="slotsContainer"></div>
        </div>

        <div class="bulk-bar" id="bulkBar"><button class="btn-bulk block" onclick="applyBulkAction('Bloqueado', 'RESERVADO')">Bloquear</button><button class="btn-bulk clear" onclick="applyBulkAction('Livre', '')">Liberar</button><button class="btn-bulk cancel" onclick="toggleMultiSelect()">Cancelar</button></div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden"><div class="modal-box"><div class="modal-title" id="modalTitle"></div><div class="modal-msg" id="modalMsg"></div><div id="modalBody"></div><div class="modal-actions" id="modalActions"></div></div></div>

    <script>
        // URL da sua implantação do Google Script
        const API_URL = "https://script.google.com/macros/s/AKfycbxewOegi1-rnQwTEieU5hJAHVDuk5kh38rjRU4CJOqMAWOv2fxicwux96U1XR9HsvU6/exec";

        let agendaData = [], adminPass = "", isAdminActive = false, selectedDayIso = "", isMultiMode = false, selectedSlots = [], isSaving = false, isLoading = false, refreshTimer = null, viewingHistory = false, serverTimeOffset = 0;

        function generateSlotCode() { const hex = () => Math.floor(Math.random()*0xffff).toString(16).padStart(4,'0'); const ts = Date.now().toString(16).slice(-4); return `${ts}:${hex()}:${hex()}:${hex()}`; }

        function toggleHistoryView() { viewingHistory = !viewingHistory; drawDaysMenu(); }
        function drawDaysMenu() {
            const container = document.getElementById('dayContainer'); container.innerHTML = '';
            const now = new Date(); const start = viewingHistory ? -7 : 0; const end = viewingHistory ? 7 : 14;
            for (let i = start; i < end; i++) {
                const d = new Date(); d.setDate(now.getDate() + i); const iso = toLocalISO(d);
                const dayBox = document.createElement('div'); dayBox.className = `day-box ${iso === selectedDayIso ? 'active' : ''}`;
                dayBox.onclick = () => selectDay(iso); dayBox.innerHTML = `<div class="dow">${d.toLocaleDateString('pt', {weekday:'short'}).replace('.','')}</div><div class="num">${d.getDate()}</div><div class="month">${d.toLocaleDateString('pt', {month:'short'}).replace('.','')}</div><div class="day-dot"></div>`;
                container.appendChild(dayBox);
            }
        }

        function toLocalISO(date) { return date.getFullYear() + "-" + (date.getMonth()+1).toString().padStart(2,'0') + "-" + date.getDate().toString().padStart(2,'0'); }
        function normalizeDate(d) { return d ? d.toString().substring(0,10) : ""; }
        function normalizeTime(t) { return t ? t.toString().substring(0,5) : ""; }

        function selectDay(iso) { selectedDayIso = iso; drawDaysMenu(); document.getElementById('dashboard').classList.add('hidden'); document.getElementById('agenda').classList.remove('hidden'); renderSlots(iso); }
        function closeAgenda() { document.getElementById('agenda').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); }

        function renderSlots(iso) {
            const container = document.getElementById('slotsContainer'); container.innerHTML = '';
            const now = new Date(); const todayIso = toLocalISO(now); const curMins = now.getHours() * 60 + now.getMinutes();

            for (let i = 0; i < 16; i++) {
                const mins = i * 90; const tLabel = Math.floor(mins/60).toString().padStart(2,'0') + ":" + (mins%60).toString().padStart(2,'0');
                const isPast = (iso < todayIso) || (iso === todayIso && mins < curMins);
                const reg = agendaData.find(r => normalizeDate(r.data) === iso && normalizeTime(r.horario) === tLabel);
                const st = reg ? reg.status : 'Livre', cl = reg ? reg.cliente : '', tel = reg ? (reg.telefone||'') : '', slotCodigo = reg ? (reg.codigo||'') : '';

                let styleClass = 'b-free', colorClass = 'c-free';
                if (st === 'Ocupado') { styleClass = 'b-busy'; colorClass = 'c-busy'; }
                else if (st === 'Bloqueado') { styleClass = 'b-lock'; colorClass = 'c-lock'; }
                else if (st === 'Aguardando Pagamento') { styleClass = 'b-pend'; colorClass = 'c-pend'; }

                let clHtml = cl || (isPast ? "" : "Toque para reservar");
                if (isAdminActive && tel) clHtml += `<br><a href="https://wa.me/55${tel.replace(/\D/g,'')}" target="_blank" class="whatsapp-btn">📱 WhatsApp</a>`;

                // EXIBIÇÃO DE TOKEN (v6) PARA CLIENTES E ADMINS
                if (slotCodigo && (st === 'Ocupado' || st === 'Aguardando Pagamento')) {
                    const isAdminPrefix = isAdminActive ? `<button onclick="event.stopPropagation(); copyToClipboard('${slotCodigo}', this)" style="background:transparent; border:none; cursor:pointer; font-size:0.7rem; margin-left:5px;">📋</button>` : '';
                    clHtml += `
                        <div style="margin-top:8px; display:flex; align-items:center; gap:5px; background:rgba(205,139,139,0.05); padding:6px 10px; border-radius:10px; border:1px solid rgba(205,139,139,0.15); width:fit-content;">
                            <span style="font-size:0.7rem; color:var(--pink); font-weight:700; letter-spacing:0.5px;">🔑 CÓDIGO:</span>
                            <span style="font-family:monospace; font-size:0.8rem; color:var(--text); font-weight:600;">${slotCodigo}</span>
                            ${isAdminPrefix}
                        </div>`;
                }

                const div = document.createElement('div'); div.className = `slot-card ${styleClass}`;
                if (isPast && !isAdminActive) { div.style.opacity = '0.4'; div.style.pointerEvents = 'none'; clHtml = "Encerrado"; }
                div.onclick = () => onSlotClick(iso, tLabel, st);
                div.innerHTML = `<div class="slot-time">${tLabel}</div><div class="slot-body"><div class="slot-st ${colorClass}">${st}</div><div class="slot-cl">${clHtml}</div></div>`;
                container.appendChild(div);
            }
        }

        async function onSlotClick(d, t, s) {
            if (isMultiMode) { selectedSlots.push(t); renderSlots(d); return; }
            if (isAdminActive) {
                const action = await showActionSheet('Gerenciar', 'O que deseja fazer?', [{label:'Bloquear',value:'bloquear'}, {label:'Liberar',value:'liberar'}, {label:'Confirmar Pgt',value:'confirmar'}]);
                if (action === 'bloquear') saveUpdates([{data:d,horario:t,status:'Bloqueado',cliente:'RESERVADO',password:adminPass}]);
                if (action === 'liberar') saveUpdates([{data:d,horario:t,status:'Livre',cliente:'',password:adminPass}]);
                if (action === 'confirmar') {
                   const r = agendaData.find(x => normalizeDate(x.data) === d && normalizeTime(x.horario) === t);
                   saveUpdates([{data:d,horario:t,status:'Ocupado',cliente:r?r.cliente:'',password:adminPass}]);
                }
            } else {
                if (s !== 'Livre') return;
                const res = await showBookingPrompt('Reservar', `Agendar às ${t}:`);
                if (res) {
                    const token = generateSlotCode();
                    const now = new Date();
                    await saveUpdates([{data:d,horario:t,status:'Aguardando Pagamento',cliente:res.nome,telefone:res.telefone,codigo:token,bookingTime:now.toISOString(),reservedUntil:new Date(now.getTime()+20*60000).toISOString()}]);
                    await showPixModal(res.nome, d + " às " + t, token);
                }
            }
        }

        function _setupModal(t, m) { document.getElementById('modalTitle').textContent = t; document.getElementById('modalMsg').textContent = m; document.getElementById('modalBody').innerHTML = ''; document.getElementById('modalActions').innerHTML = ''; }
        function showPrompt(t, m, p, isPass=false) {
            return new Promise(resolve => {
                _setupModal(t, m); document.getElementById('modalBody').innerHTML = `<input type="${isPass?'password':'text'}" id="mIn" class="modal-input" placeholder="${p}">`;
                document.getElementById('modalActions').innerHTML = `<button class="modal-btn primary" id="mOk">Entrar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('mOk').onclick = () => { document.getElementById('modalOverlay').classList.add('hidden'); resolve(document.getElementById('mIn').value); };
            });
        }
        function showBookingPrompt(t, m) {
            return new Promise(resolve => {
                _setupModal(t, m); document.getElementById('modalBody').innerHTML = `<input type="text" id="mN" class="modal-input" placeholder="Seu Nome"><input type="tel" id="mT" class="modal-input" placeholder="WhatsApp">`;
                document.getElementById('modalActions').innerHTML = `<button class="modal-btn primary" id="mOk">Reservar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('mOk').onclick = () => { resolve({nome:document.getElementById('mN').value, telefone:document.getElementById('mT').value}); document.getElementById('modalOverlay').classList.add('hidden'); };
            });
        }
        function showActionSheet(t, m, choices) {
            return new Promise(resolve => {
                _setupModal(t, m); choices.forEach(c => {
                    const b = document.createElement('div'); b.className = 'modal-choice'; b.textContent = c.label; b.onclick = () => { document.getElementById('modalOverlay').classList.add('hidden'); resolve(c.value); };
                    document.getElementById('modalBody').appendChild(b);
                });
                document.getElementById('modalOverlay').classList.remove('hidden');
            });
        }
        function showPixModal(nome, dataStr, token) {
            return new Promise(resolve => {
                _setupModal('Pagamento', 'Pague a taxa de reserva de R$ 25,00 no PIX:');
                document.getElementById('modalBody').innerHTML = `
                    <div style="background:var(--card); padding:15px; border:1px dashed var(--pink); border-radius:15px; text-align:center;">
                        Chave: <b>62993362375</b><br>Titular: Camila Alves de Lima<br>
                        <button onclick="copyToClipboard('62993362375', this)" class="modal-btn secondary" style="margin-top:10px;">📋 Copiar Chave</button>
                    </div>
                    <div style="margin-top:15px; background:rgba(0,0,0,0.05); padding:10px; border-radius:10px; text-align:center;">
                        Código da Vaga: <b>${token}</b><br>
                        <span style="font-size:0.7rem; color:var(--pink);">Guarde seu código para conferência!</span>
                    </div>
                    <p style="margin-top:15px; font-size:0.8rem; color:red; font-weight:bold; text-align:center;">Você tem 20 minutos para enviar o comprovante no WhatsApp!</p>
                `;
                document.getElementById('modalActions').innerHTML = `<a href="https://wa.me/559296150540" target="_blank" class="modal-btn primary" style="text-decoration:none; text-align:center;">Enviar no WhatsApp</a>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
            });
        }

        function copyToClipboard(text, btn) { navigator.clipboard.writeText(text); const old = btn.innerText; btn.innerText = "✅ Copiado!"; setTimeout(() => btn.innerText = old, 1500); }

        async function init() {
            setLoading(true); const url = `${API_URL}?pass=${encodeURIComponent(adminPass)}`;
            const script = document.createElement('script'); const cb = 'jsonp_' + Date.now();
            window[cb] = (data) => { delete window[cb]; document.body.removeChild(script); handleData(data); };
            script.src = `${url}&callback=${cb}`; document.body.appendChild(script);
        }

        function handleData(data) {
            setLoading(false); if (data.status === 'OK') {
                agendaData = data.agenda; isAdminActive = data.isAdmin;
                if (!selectedDayIso) selectedDayIso = toLocalISO(new Date());
                updateAdminUI(); drawDaysMenu(); renderSlots(selectedDayIso);
                setTimeout(init, 30000);
            }
        }

        function setLoading(v) { document.getElementById('loader').style.display = v ? 'block' : 'none'; }

        async function saveUpdates(l) {
            setLoading(true);
            try {
                await fetch(API_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(l) });
                setTimeout(init, 1000);
            } catch(e) { setLoading(false); }
        }

        async function doAdminAuth() {
            if (isAdminActive) { adminPass = ''; isAdminActive = false; init(); }
            else { const p = await showPrompt('Admin', 'Senha:', '...', true); if (p) { adminPass = p; init(); } }
        }

        function updateAdminUI() {
            document.body.classList.toggle('admin-mode', isAdminActive);
            document.getElementById('admBtn').innerText = isAdminActive ? "🔓 SAIR" : "🔒";
            document.getElementById('adminBadge').style.display = isAdminActive ? "inline-block" : "none";
            document.getElementById('historyBtnContainer').style.display = isAdminActive ? "block" : "none";
        }

        function toggleTheme() { document.body.classList.toggle('dark-theme'); }
        window.onload = init;
    </script>
</body>
