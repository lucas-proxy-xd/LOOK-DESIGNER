<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOK DESIGNER</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg: #FCFAF9;
            --card: rgba(255, 255, 255, 0.95);
            --border: rgba(220, 205, 205, 0.6);
            --pink: #CD8B8B;
            --pink-glow: rgba(205, 139, 139, 0.4);
            --emerald: #A3BCA7;
            --slate: #8A7A7A;
            --text: #3D2D2D;
            --text-inverse: #FFFFFF;
            --status-free: #6E9477;
            --status-busy: #B56565;
            --status-lock: #978F8F;
            --status-pend: #B38600;
            --blur: blur(16px);
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.dark-theme {
            --bg: #1C1818;
            --card: rgba(43, 31, 31, 0.95);
            --border: rgba(90, 70, 70, 0.5);
            --pink: #D89898;
            --pink-glow: rgba(216, 152, 152, 0.3);
            --emerald: #8BB094;
            --slate: #B3AAAA;
            --text: #F4F0F0;
            --text-inverse: #FFFFFF;
            --status-free: #8BB094;
            --status-busy: #D89898;
            --status-lock: #DFD9D9;
            --status-pend: #D4AF37;
        }

        body.dark-theme .modal-box {
            background: #2A1F1F;
        }

        body.dark-theme .modal-input,
        body.dark-theme .modal-choice {
            background: #1C1818;
            color: #EFEBEB;
            border-color: rgba(120, 90, 90, 0.4);
        }

        body.dark-theme .modal-input:focus {
            background: #2A1F1F;
        }

        body.dark-theme .modal-btn.secondary {
            background: #1C1818;
            color: #EFEBEB;
            border: 1px solid var(--border);
        }

        body.dark-theme .slot-card.selected {
            background: #382525;
        }

        body.dark-theme .btn-bulk.cancel {
            background: #3A2A2A;
            color: #FFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(205, 139, 139, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(205, 139, 139, 0.04) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.4s var(--ease), color 0.4s var(--ease);
        }

        body.admin-mode {
            --pink: #FF1493;
            --pink-glow: rgba(255, 20, 147, 0.4);
            box-shadow: inset 0 0 150px rgba(255, 20, 147, 0.25);
            background-color: rgba(255, 20, 147, 0.02);
            border: 5px solid #FF1493;
        }

        body.admin-mode #adminBadge {
            background: #FF1493;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
        }

        body.admin-mode .slot-card {
            border-color: rgba(255, 20, 147, 0.3);
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin: 35px 0;
            position: relative;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.6rem;
            letter-spacing: 5px;
            font-weight: 600;
            line-height: 1;
            color: var(--text);
            text-transform: uppercase;
        }

        #adminBadge {
            background: var(--pink);
            color: var(--text-inverse);
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px var(--pink-glow);
            display: inline-block;
            display: none;
            animation: pulse 2s infinite;
        }

        #themeToggle {
            position: absolute;
            right: 0px;
            top: 0px;
            font-size: 1.4rem;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
        }

        .btn-lock {
            position: absolute;
            left: 0px;
            top: 0px;
            font-size: 1.2rem;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            opacity: 0.6;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--slate);
        }

        .btn-lock.active {
            color: var(--pink);
            font-size: 0.7rem;
            font-weight: 700;
            top: 5px;
            left: 5px;
        }

        .floating-wa {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: transform 0.2s;
        }

        .floating-wa:hover {
            transform: scale(1.1);
        }

        .view {
            animation: fadeIn 0.5s var(--ease);
        }

        .hidden {
            display: none !important;
        }

        /* Day picker */
        .dash-grid {
            display: flex;
            overflow-x: auto;
            gap: 14px;
            padding: 10px 0 30px 0;
            scrollbar-width: none;
        }

        .dash-grid::-webkit-scrollbar {
            display: none;
        }

        .day-box {
            min-width: 88px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            flex-shrink: 0;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.03);
            backdrop-filter: var(--blur);
        }

        .day-box:hover {
            transform: translateY(-3px);
            border-color: var(--pink);
            box-shadow: 0 10px 25px rgba(205, 139, 139, 0.15);
        }

        .day-box.active {
            background: var(--pink);
            border-color: var(--pink);
            color: var(--text-inverse);
            box-shadow: 0 10px 25px var(--pink-glow);
        }

        .day-box .dow {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--slate);
        }

        .day-box.active .dow {
            color: rgba(255, 255, 255, 0.9);
        }

        .day-box .num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 600;
            margin: 6px 0 2px 0;
            line-height: 1;
        }

        .day-box .month {
            font-size: 0.7rem;
            opacity: 0.8;
            color: var(--slate);
            font-weight: 500;
        }

        .day-box.active .month {
            color: rgba(255, 255, 255, 0.9);
        }

        .day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin: 10px auto 0;
            background: transparent;
            transition: background 0.3s;
        }

        .day-dot.busy {
            background: var(--pink);
        }

        .day-dot.free {
            background: var(--emerald);
        }

        .day-box.active .day-dot {
            background: var(--text-inverse);
        }

        /* Agenda header */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 25px;
        }

        .btn-nav {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            backdrop-filter: var(--blur);
            transition: all 0.2s var(--ease);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .btn-nav:hover {
            border-color: var(--pink);
            color: var(--pink);
            transform: translateX(-2px);
        }

        /* Agenda Grid Container */
        .agenda-grid {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #dateTitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 1px;
        }

        /* Slot cards */
        .slot-card {
            display: flex;
            align-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px 22px;
            border-radius: 20px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            backdrop-filter: var(--blur);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .slot-card:hover {
            transform: translateY(-2px);
            border-color: var(--pink);
            box-shadow: 0 8px 25px rgba(205, 139, 139, 0.12);
        }

        .slot-card.selected {
            border-color: var(--pink);
            box-shadow: 0 8px 20px var(--pink-glow);
        }

        .slot-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            padding-right: 22px;
            border-right: 1px dashed var(--border);
            margin-right: 22px;
            min-width: 65px;
        }

        .slot-body {
            flex: 1;
        }

        .slot-st {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .slot-cl {
            font-size: 0.85rem;
            color: var(--slate);
            margin-top: 5px;
            font-weight: 400;
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
        }

        .c-free {
            color: var(--status-free);
        }

        .c-busy {
            color: var(--status-busy);
        }

        .c-lock {
            color: var(--status-lock);
            opacity: 0.8;
        }

        .b-free {
            border-left: 5px solid var(--status-free);
        }

        .b-busy {
            border-left: 5px solid var(--status-busy);
        }

        .b-lock {
            border-left: 5px solid var(--status-lock);
        }

        .c-pend {
            color: var(--status-pend);
        }

        .b-pend {
            border-left: 5px solid var(--status-pend);
        }

        #loader {
            position: fixed;
            top: 0;
            left: -50%;
            width: 50%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--pink), transparent);
            box-shadow: 0 0 12px var(--pink);
            z-index: 9000;
            display: none;
            animation: loadAnim 1.4s ease-in-out infinite;
        }

        /* Admin access button */
        .adm-access {
            margin-top: 50px;
            width: 100%;
            padding: 18px 30px;
            border-radius: 40px;
            cursor: pointer;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--slate);
            font-weight: 500;
            font-size: 0.75rem;
            text-align: center;
            letter-spacing: 2.5px;
            transition: all 0.3s var(--ease);
        }

        .adm-access:hover {
            border-color: var(--pink);
            color: var(--pink);
        }

        .adm-access.active {
            border-style: solid;
            border-color: var(--pink);
            color: var(--pink);
            box-shadow: 0 5px 20px var(--pink-glow);
        }

        .bulk-bar {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px 16px;
            gap: 12px;
            z-index: 999;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            align-items: center;
        }

        .btn-bulk {
            padding: 12px 22px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s var(--ease);
        }

        .btn-bulk:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-bulk.block {
            background: var(--pink);
            color: var(--text-inverse);
            box-shadow: 0 4px 15px var(--pink-glow);
        }

        .btn-bulk.clear {
            background: var(--emerald);
            color: var(--text-inverse);
        }

        .btn-bulk.cancel {
            background: #FAFAFA;
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* Modal system */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s var(--ease);
        }

        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 390px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .modal-msg {
            font-size: 0.9rem;
            color: var(--slate);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-input {
            width: 100%;
            background: #FAFAFA;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .modal-input:focus {
            border-color: var(--pink);
            box-shadow: 0 4px 15px var(--pink-glow);
        }

        .modal-input::placeholder {
            color: #A09595;
        }

        .modal-input.password {
            letter-spacing: 3px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .modal-btn {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.2s var(--ease);
        }

        .modal-btn.primary {
            background: var(--pink);
            color: var(--text-inverse);
        }

        .modal-btn.primary:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--pink-glow);
        }

        .modal-btn.secondary {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .modal-choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .modal-choice {
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #FAFAFA;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text);
            text-align: center;
            transition: all 0.2s var(--ease);
            font-weight: 500;
        }

        .modal-choice:hover {
            border-color: var(--pink);
            color: var(--pink);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(205, 139, 139, 0.1);
        }

        .admin-bar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #statusIndicator {
            font-size: 0.6rem;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--slate);
            margin-top: 15px;
            transition: color 0.5s;
            text-transform: uppercase;
        }

        #statusBar {
            width: 24px;
            height: 2px;
            background: var(--pink);
            margin: 8px auto 0;
            transition: width 0.5s, background-color 0.5s;
            opacity: 0.5;
            border-radius: 2px;
        }

        .whatsapp-btn {
            color: var(--emerald);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 4px 8px;
            background: rgba(163, 188, 167, 0.15);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .whatsapp-btn:hover {
            background: rgba(163, 188, 167, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 15px var(--pink-glow);
            }
        }

        @keyframes loadAnim {
            0% {
                left: -50%;
            }

            100% {
                left: 110%;
            }
        }

        .watermark-sig {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-family: 'Cormorant Garamond', serif;
            color: var(--text);
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.45;
            pointer-events: none;
            z-index: 1000;
        }

        .watermark-sig span {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.5rem;
            text-transform: uppercase;
            font-style: normal;
            letter-spacing: 2px;
            margin-top: 2px;
            font-weight: 600;
            opacity: 0.8;
        }
    </style>
</head>

        </div>

        let isAdminActive = false;
        let selectedDayIso = "";
        let isMultiMode = false;
        let selectedSlots = [];
        let isSaving = false;
        let isLoading = false;
        let refreshTimer = null;
        let viewingHistory = false;
        let serverTimeOffset = 0;

        // Configurações da Agenda (recebe do backend)
        let scheduleConfig = { start: '08:00', end: '20:00', duration: 90 };

        // Gera um código único no formato visual IPv6 (4 grupos de 4 hex)
        function generateSlotCode() {
            const hex = () => Math.floor(Math.random() * 0xffff).toString(16).padStart(4, '0');
            const ts = Date.now().toString(16).slice(-4); // 4 chars do timestamp
            return `${ts}:${hex()}:${hex()}:${hex()}`;
        }

        function toggleHistoryView() {
            viewingHistory = !viewingHistory;
            const btn = document.querySelector('#historyBtnContainer button');
            const title = document.getElementById('dashTitle');
            if (viewingHistory) {
                btn.textContent = 'VOLTAR PARA HOJE';
                btn.style.background = 'var(--pink)';
                btn.style.color = 'var(--text-inverse)';
                title.innerHTML = '<span style="color:#CD8B8B; font-weight:800;">⚠️ VISUALIZANDO PASSADO</span>';
            } else {
                btn.textContent = 'VER HISTÓRICO (-7D)';
                btn.style.background = 'transparent';
                btn.style.color = 'var(--pink)';
                title.textContent = 'SELECIONE UMA DATA';
            }
            drawDaysMenu();
        }

        function drawDaysMenu() {
            const container = document.getElementById('dayContainer');
            container.innerHTML = '';
            const daysCount = 14;
            const now = new Date();

            const startOffset = viewingHistory ? -7 : 0;
            const limit = viewingHistory ? 7 : daysCount;

            for (let i = startOffset; i < limit; i++) {
                const d = new Date();
                d.setDate(now.getDate() + i);
                const iso = toLocalISO(d);
                const active = (iso === selectedDayIso);

                const dayBox = document.createElement('div');
                dayBox.className = `day-box ${active ? 'active' : ''}`;
                dayBox.onclick = () => selectDay(iso);

                const dow = d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
                const num = d.getDate();
                const month = d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '');

                dayBox.innerHTML = `
                    <div class="dow">${dow}</div>
                    <div class="num">${num}</div>
                    <div class="month">${month}</div>
                    <div class="day-dot"></div>
                `;
                container.appendChild(dayBox);
            }
        }

        function toLocalISO(date) {
            const y = date.getFullYear();
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function normalizeDate(d) {
            if (!d) return "";
            return d.toString().substring(0, 10);
        }
        function normalizeTime(t) {
            if (!t) return "";
            return t.toString().substring(0, 5);
        }

        function selectDay(iso) {
            selectedDayIso = iso;
            drawDaysMenu();
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('agenda').classList.remove('hidden');

            const d = new Date(iso + 'T12:00:00');
            const fmt = d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit' });
            document.getElementById('dateTitle').textContent = fmt.charAt(0).toUpperCase() + fmt.slice(1);

            renderSlots(iso);
        }

        function closeAgenda() {
            document.getElementById('agenda').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if (isMultiMode) toggleMultiSelect();
        }

        // =============================================
        function renderSlots(iso) {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';

            const now = new Date();
            const todayIso = toLocalISO(now);
            const currentMins = now.getHours() * 60 + now.getMinutes();

            // Geração Dinâmica da Grade baseada na Configuração
            const [startHH, startMM] = scheduleConfig.start.split(':').map(Number);
            const [endHH, endMM] = scheduleConfig.end.split(':').map(Number);

            let curTotal = startHH * 60 + startMM;
            const endTotal = endHH * 60 + endMM;

            const grid = document.createElement('div');
            grid.className = 'agenda-grid';

            while (curTotal < endTotal) {
                const hh = Math.floor(curTotal / 60).toString().padStart(2, '0');
                const mm = (curTotal % 60).toString().padStart(2, '0');
                const tLabel = `${hh}:${mm}`;

                const isPast = (iso < todayIso) || (iso === todayIso && curTotal < currentMins);

                const reg = agendaData.find(r => {
                    const rData = normalizeDate(r.data);
                    const rTime = normalizeTime(r.horario);
                    return rData === iso && rTime === tLabel;
                });

                const st = reg ? reg.status : 'Livre';
                const cl = reg ? reg.cliente : '';
                const tel = reg ? (reg.telefone || '') : '';
                const slotCodigo = reg ? (reg.codigo || '') : '';
                const isSelected = selectedSlots.includes(tLabel);

                // Duração do bloco: se tiver registro, usa a duração dele, senão usa o padrão (30)
                const blockDur = reg ? parseInt(reg.duration || scheduleConfig.duration || 30) : (scheduleConfig.duration || 30);

                let styleClass = 'b-free', colorClass = 'c-free';
                if (st === 'Ocupado') { styleClass = 'b-busy'; colorClass = 'c-busy'; }
                else if (st === 'Bloqueado') { styleClass = 'b-lock'; colorClass = 'c-lock'; }
                else if (st === 'Aguardando Pagamento') { styleClass = 'b-pend'; colorClass = 'c-pend'; }

                let clHtml = cl;
                if (!clHtml) {
                    if (!isPast && st === 'Livre') {
                        clHtml = 'Toque para reservar';
                    } else if (isPast && isAdminActive && st === 'Livre') {
                        clHtml = '<span style="font-size:0.8rem; font-style:italic; opacity:0.85;">Não houve atendimento ou não foi registrado pelo ADMIN</span>';
                    }
                }

                if (isAdminActive && tel) {
                    const dateParts = iso.split('-');
                    const dataFmt = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                    const customMsg = `Olá, ${cl}! Bem-vinda ao LOOK DESIGNER. Passando para confirmar o seu agendamento para o dia ${dataFmt} às ${tLabel}. Qualquer dúvida, estou à disposição!\n\n${CONFIG.WA_MANAGER} - GERENTE`;

                    const telNum = tel.replace(/\D/g, '');
                    clHtml += `<br><a href="https://wa.me/55${telNum}?text=${encodeURIComponent(customMsg)}" target="_blank" onclick="event.stopPropagation()" class="whatsapp-btn">📱 Enviar WhatsApp</a>`;
                }

                if (isAdminActive && st === 'Aguardando Pagamento') {
                    const bTime = reg ? reg.bookingTime : '';
                    if (bTime) {
                        const bDate = new Date(bTime);
                        const nowServer = new Date(Date.now() + serverTimeOffset);
                        const diffMs = nowServer - bDate;
                        const diffMin = Math.floor(diffMs / 60000);
                        const timeStr = bDate.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                        clHtml += `<div style="margin-top:8px; font-size:0.7rem; color:var(--status-pend); font-weight:600; background:rgba(179,134,0,0.1); padding:4px 8px; border-radius:6px; display:inline-block;">`;
                        clHtml += `⏳ Aguardando há ${diffMin} min (desde ${timeStr})`;
                        clHtml += `</div>`;
                    }
                }

                if (isAdminActive && slotCodigo) {
                    clHtml += `
                        <div style="display:flex; align-items:center; gap:6px; margin-top:6px;">
                            <span style="font-family:monospace; font-size:0.65rem; opacity:0.6; letter-spacing:1px; background:rgba(0,0,0,0.05); padding:2px 6px; border-radius:4px;">🔑 ${slotCodigo}</span>
                            <button onclick="event.stopPropagation(); copyToClipboard('${slotCodigo}', this)" style="background:transparent; border:none; cursor:pointer; font-size:0.7rem; opacity:0.5;">📋</button>
                        </div>
                    `;
                } else if (!isAdminActive && slotCodigo && (st === 'Ocupado' || st === 'Aguardando Pagamento')) {
                    clHtml += `
                        <div style="margin-top:8px; display:flex; align-items:center; gap:5px; background:rgba(205,139,139,0.05); padding:6px 10px; border-radius:10px; border:1px solid rgba(205,139,139,0.15); width:fit-content;">
                            <span style="font-size:0.7rem; color:var(--pink); font-weight:700; letter-spacing:0.5px;">🔑 CÓDIGO:</span>
                            <span style="font-family:monospace; font-size:0.8rem; color:var(--text); font-weight:600;">${slotCodigo}</span>
                        </div>
                    `;
                }

                const div = document.createElement('div');
                div.className = `slot-card ${styleClass}${isSelected ? ' selected' : ''}`;

                // Se o bloco for maior que 30 min, aumenta um pouco o padding visual
                if (blockDur > 30) {
                    div.style.minHeight = '100px';
                }

                let stHtml = `<div class="slot-st ${colorClass}">${st}</div>`;
                if (isPast) {
                    div.style.opacity = '0.35';
                    div.style.filter = 'grayscale(0.8)';
                    if (!isAdminActive) {
                        div.style.pointerEvents = 'none';
                        stHtml = '';
                        clHtml = '<span style="opacity:0.8; font-weight:500;">Horário encerrado</span>';
                    }
                }

                div.onclick = () => onSlotClick(iso, tLabel, st);

                // Exibe o horário de término se for um bloco longo
                let labelFinal = tLabel;
                if (blockDur > (scheduleConfig.duration || 30)) {
                    const finalMins = curTotal + blockDur;
                    const fH = Math.floor(finalMins / 60).toString().padStart(2, '0');
                    const fM = (finalMins % 60).toString().padStart(2, '0');
                    labelFinal += ` - ${fH}:${fM}`;
                }

                div.innerHTML = `
                    <div class="slot-time">${labelFinal}</div>
                    <div class="slot-body">
                        ${stHtml}
                        <div class="slot-cl" style="margin-top:${stHtml ? '5px' : '0'};">${clHtml}</div>
                    </div>
                `;
                grid.appendChild(div);

                // Incrementa para o próximo bloco: pula o tempo de duração deste agendamento
                curTotal += blockDur;
            }
            container.appendChild(grid);
        }

        async function onSlotClick(d, t, s) {
            if (isMultiMode) {
                const idx = selectedSlots.indexOf(t);
                if (idx > -1) selectedSlots.splice(idx, 1);
                else selectedSlots.push(t);
                renderSlots(d);
                return;
            }

            if (!isAdminActive) {
                if (s !== 'Livre') {
                    await showAlert('Horário indisponível', 'Este horário já está ocupado ou bloqueado.');
                    return;
                }

                const lastBookingTime = localStorage.getItem('look_booking_ts');
                const nowMs = Date.now();
                const limitMs = (CONFIG.RESERVE_MINUTES || 20) * 60000;

                if (localStorage.getItem('look_has_booked') === 'true') {
                    // Se o tempo passou OU se não houver registro de tempo, limpamos o bloqueio
                    if (!lastBookingTime || (nowMs - parseInt(lastBookingTime)) > limitMs) {
                        localStorage.removeItem('look_has_booked');
                        localStorage.removeItem('look_booking_ts');
                    } else {
                        const wpContato = `https://wa.me/${CONFIG.WA_PHONE}?text=Ol%C3%A1!%20Gostaria%20de%20reagendar%20ou%20fazer%20uma%20nova%20reserva.`;
                        await _showContactAlert('Limite Alcançado', 'Você já possui uma solicitação de agendamento em andamento. Para alterar o horário ou realizar um novo agendamento, por favor entre em contato com a gerente.', wpContato);
                        return;
                    }
                }

                const result = await showBookingPrompt('Reservar Horário', `Preencha seus dados para agendar às ${t}:`);
                if (!result) return;

                // VERIFICAÇÃO DE SOBREPOSIÇÃO (Collision Check)
                const startMins = parseInt(t.split(':')[0]) * 60 + parseInt(t.split(':')[1]);
                const endMins = startMins + result.duration;

                const hasCollision = agendaData.some(reg => {
                    if (normalizeDate(reg.data) !== normalizeDate(d)) return false;
                    if (reg.status === 'Livre') return false;

                    const rStart = parseInt(reg.horario.split(':')[0]) * 60 + parseInt(reg.horario.split(':')[1]);
                    const rDur = parseInt(reg.duration || scheduleConfig.duration || 30);
                    const rEnd = rStart + rDur;

                    // Colisão se o intervalo [start, end] intersecta [rStart, rEnd]
                    return (startMins < rEnd && endMins > rStart);
                });

                if (hasCollision) {
                    await showAlert('Conflito de Horário', 'Desculpe, o tempo escolhido para este procedimento ultrapassa outro agendamento já existente.');
                    return;
                }

                // Gera código único estilo IPv6 para rastreio
                const slotCode = generateSlotCode();

                // Bloqueia no navegador para evitar spam
                localStorage.setItem('look_has_booked', 'true');
                localStorage.setItem('look_booking_ts', Date.now().toString());
                localStorage.setItem('look_last_token', slotCode);

                // Timestamps
                const nowTotal = new Date();
                const bTime = nowTotal.toISOString();
                const rUntil = new Date(nowTotal.getTime() + CONFIG.RESERVE_MINUTES * 60000).toISOString();

                // Salva como Pendente de maneira otimista
                await saveUpdates([{
                    data: d, horario: t, status: 'Aguardando Pagamento',
                    cliente: result.nome, telefone: result.telefone,
                    codigo: slotCode, bookingTime: bTime, reservedUntil: rUntil,
                    duration: result.duration,
                    password: adminPass
                }]);

                // Exibe Modal do PIX
                const dateParts = d.split('-'); // YYYY-MM-DD
                const dataFmt = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]} às ${t}`;
                await showPixModal(result.nome, dataFmt, slotCode);

            } else {
                let actChoices = [];
                if (s === 'Aguardando Pagamento') {
                    actChoices = [
                        { label: '✅ Confirmar Pagamento', value: 'confirmar_pagamento' },
                        { label: '❌ Cancelar Falta Pgt.', value: 'liberar' }
                    ];
                } else {
                    actChoices = [
                        { label: s === 'Livre' ? '🔒 Bloquear Horário' : '🔓 Liberar Horário', value: s === 'Livre' ? 'bloquear' : 'liberar' },
                        { label: '📝 Agendar Cliente (Admin)', value: 'agendar_admin' }
                    ];
                }

                const action = await showActionSheet('Gerenciar Horário', `O que deseja fazer com o horário das ${t}?`, actChoices);
                if (!action) return;

                if (action === 'bloquear') {
                    await saveUpdates([{ data: d, horario: t, status: 'Bloqueado', cliente: 'RESERVADO', telefone: '', password: adminPass }]);
                } else if (action === 'liberar') {
                    await saveUpdates([{ data: d, horario: t, status: 'Livre', cliente: '', telefone: '', password: adminPass }]);
                } else if (action === 'agendar_admin') {
                    const res = await showBookingPrompt('Agendamento Manual', 'Dados do cliente:');
                    if (res) {
                        await saveUpdates([{
                            data: d, horario: t, status: 'Ocupado',
                            cliente: res.nome, telefone: res.telefone,
                            duration: res.duration,
                            password: adminPass
                        }]);
                    }
                } else if (action === 'confirmar_pagamento') {
                    // Busca dados atuais para não perder nome/tel/duration
                    const r = agendaData.find(x => normalizeDate(x.data) === d && normalizeTime(x.horario) === t);
                    await saveUpdates([{
                        data: d, horario: t, status: 'Ocupado',
                        cliente: r ? r.cliente : 'Cliente',
                        telefone: r ? r.telefone : '',
                        duration: r ? r.duration : 60,
                        password: adminPass
                    }]);
                }
            }
        }

        // =============================================
        // MODAIS CUSTOMIZADOS
        // =============================================
        function _setupModal(title, msg) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMsg').textContent = msg;
            document.getElementById('modalBody').innerHTML = '';
            document.getElementById('modalActions').innerHTML = '';
        }

        function showAlert(title, msg) {
            return new Promise(resolve => {
                _setupModal(title, msg);
                document.getElementById('modalActions').innerHTML = `<button class="modal-btn primary" id="mOk">Entendi</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('mOk').onclick = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve();
                };
            });
        }

        function _showContactAlert(title, msg, wpLink) {
            return new Promise(resolve => {
                _setupModal(title, msg);
                document.getElementById('modalActions').innerHTML = `
                    <a href="${wpLink}" target="_blank" class="modal-btn primary" style="text-decoration:none; text-align:center;">Falar com a Gerente</a>
                    <button class="modal-btn secondary" id="mClose" style="margin-top:8px;">Fechar</button>
                `;
                document.getElementById('modalOverlay').classList.remove('hidden');
                const close = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve();
                };
                document.getElementById('mClose').onclick = close;
            });
        }

        function showBookingPrompt(title, msg) {
            return new Promise(resolve => {
                _setupModal(title, msg);
                const showDur = isAdminActive;
                document.getElementById('modalBody').innerHTML = `
                    <input type="text" id="mNome" class="modal-input" placeholder="Seu nome completo" autocomplete="off">
                    <input type="tel" id="mTel" class="modal-input" placeholder="Telefone (WhatsApp)" autocomplete="off">
                    <div style="margin-top:10px; ${showDur ? '' : 'display:none;'}">
                        <label style="font-size:0.65rem; font-weight:700; color:var(--pink); display:block; margin-bottom:4px;">DURAÇÃO ESTIMADA</label>
                        <select id="mDur" class="modal-input">
                            <option value="30">30 minutos</option>
                            <option value="60" ${scheduleConfig.duration === 60 ? 'selected' : ''}>1 hora</option>
                            <option value="90" ${scheduleConfig.duration === 90 ? 'selected' : ''}>1 hora e 30 min</option>
                            <option value="120">2 horas</option>
                            <option value="180">3 horas</option>
                        </select>
                    </div>
                `;
                document.getElementById('modalActions').innerHTML = `
                    <button class="modal-btn secondary" id="mCancel">Cancelar</button>
                    <button class="modal-btn primary" id="mOk">Prosseguir</button>
                `;
                document.getElementById('modalOverlay').classList.remove('hidden');

                const confirm = () => {
                    const n = document.getElementById('mNome').value.trim();
                    const t = document.getElementById('mTel').value.trim();
                    // Se não for admin, usa a duração padrão da config ou 60m
                    const d = showDur ? parseInt(document.getElementById('mDur').value) : (scheduleConfig.duration || 60);
                    
                    if (!n || !t) { alert('Preencha nome e telefone!'); return; }
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve({ nome: n, telefone: t, duration: d });
                };
                document.getElementById('mOk').onclick = confirm;
                document.getElementById('mCancel').onclick = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve(null);
                };
            });
        }

        function showPrompt(title, msg, placeholder, isPassword = false) {
            return new Promise(resolve => {
                _setupModal(title, msg);
                document.getElementById('modalBody').innerHTML = `
                    <input type="${isPassword ? 'password' : 'text'}" id="mInput" class="modal-input ${isPassword ? 'password' : ''}" placeholder="${placeholder}">
                `;
                document.getElementById('modalActions').innerHTML = `
                    <button class="modal-btn secondary" id="mCancel">Cancelar</button>
                    <button class="modal-btn primary" id="mOk">Entrar</button>
                `;
                document.getElementById('modalOverlay').classList.remove('hidden');

                const confirm = () => {
                    const val = document.getElementById('mInput').value;
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve(val);
                };
                document.getElementById('mOk').onclick = confirm;
                document.getElementById('mCancel').onclick = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve(null);
                };
            });
        }

        function showActionSheet(title, msg, choices) {
            return new Promise(resolve => {
                _setupModal(title, msg);
                const container = document.createElement('div');
                container.className = 'modal-choices';
                choices.forEach(c => {
                    const btn = document.createElement('div');
                    btn.className = 'modal-choice';
                    btn.textContent = c.label;
                    btn.onclick = () => {
                        document.getElementById('modalOverlay').classList.add('hidden');
                        resolve(c.value);
                    };
                    container.appendChild(btn);
                });
                document.getElementById('modalBody').appendChild(container);
                document.getElementById('modalActions').innerHTML = `<button class="modal-btn secondary" id="mCancel">Fechar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('mCancel').onclick = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve(null);
                };
            });
        }

        function showAdminBlockModal() {
            return new Promise(resolve => {
                _setupModal('Bloqueio em Massa', 'Selecione o intervalo de horas:');
                document.getElementById('modalBody').innerHTML = `
                    <div style="display:flex; gap:10px;">
                        <select id="mStart" class="modal-input" style="flex:1;">${genTimeOptions()}</select>
                        <select id="mEnd" class="modal-input" style="flex:1;">${genTimeOptions()}</select>
                    </div>
                `;
                document.getElementById('modalActions').innerHTML =
                    `<button class="modal-btn secondary" id="mCancel">Cancelar</button>
                     <button class="modal-btn primary"   id="mOk">Bloquear Intervalo</button>`;

                document.getElementById('modalOverlay').classList.remove('hidden');

                const confirm = () => {
                    const s = parseInt(document.getElementById('mStart').value);
                    const eObj = parseInt(document.getElementById('mEnd').value);
                    if (eObj < s) {
                        alert("O horário final deve ser maior ou igual ao inicial.");
                        return;
                    }
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve({ startIdx: s, endIdx: eObj });
                };
                const cancel = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve(null);
                };

                document.getElementById('mOk').onclick = confirm;
                document.getElementById('mCancel').onclick = cancel;
            });
        }

        function showPixModal(nome, dataStr, slotCode) {
            return new Promise(resolve => {
                _setupModal('Pagamento da Taxa', `Quase lá! Para garantir sua vaga, efetue o pagamento da taxa de reserva de ${CONFIG.PIX_VALUE} no PIX:`);

                const wpLink = `https://wa.me/${CONFIG.WA_PHONE}?text=Ol%C3%A1!%20Realizei%20o%20agendamento%20de%20${encodeURIComponent(nome)}%20para%20o%20dia%20${encodeURIComponent(dataStr)}%20e%20este%20%C3%A9%20o%20meu%20comprovante%20de%20pagamento.%20C%C3%B3digo%20da%20Vaga:%20${slotCode}`;

                document.getElementById('modalBody').innerHTML = `
                    <div style="background:var(--card); padding:10px; border-radius:12px; border:1px dashed var(--pink); text-align:center; font-weight:bold; letter-spacing:0.5px; margin-bottom:15px; color:var(--slate);">
                        Chave PIX (${CONFIG.PIX_BANK}):<br>
                        <div style="font-size:0.7rem; opacity:0.8; margin-bottom:4px;">Titular: ${CONFIG.PIX_HOLDER}</div>
                        <div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-top:5px;">
                            <span style="font-size:1.1rem; color:var(--text);">${CONFIG.PIX_KEY}</span>
                            <button id="btnCopyPix" style="background:transparent; border:1px solid var(--pink); color:var(--text); border-radius:4px; padding:2px 8px; cursor:pointer; font-size:0.7rem; transition:0.2s;">📋 Copiar</button>
                        </div>
                    </div>
                    
                    <div style="background:rgba(205,139,139,0.05); padding:12px; border-radius:12px; border:1px solid var(--border); margin-bottom:15px; text-align:center;">
                        <span style="font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--slate); font-weight:700;">Seu Código de Rastreio (v6)</span>
                        <div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-top:4px;">
                            <span style="font-family:monospace; font-size:1rem; color:var(--pink); font-weight:700;">${slotCode}</span>
                            <button id="btnCopyToken" style="background:transparent; border:1px solid var(--pink); color:var(--text); border-radius:4px; padding:2px 8px; cursor:pointer; font-size:0.7rem;">📋</button>
                        </div>
                    </div>

                    <p style="font-size:0.85rem; font-weight:bold; color:var(--pink); text-align:center; margin-bottom:10px;">
                        ⚠️ IMPORTANTE: Você tem ${CONFIG.RESERVE_MINUTES} minutos para enviar o comprovante. Após esse prazo, sem confirmação, a vaga é liberada automaticamente.
                    </p>
                    <p style="font-size:0.75rem; color:var(--slate); text-align:center; margin-bottom:15px;">Copie a chave acima, faça o pagamento e envie o comprovante no WhatsApp.</p>
                `;
                document.getElementById('modalActions').innerHTML = `
                    <a href="${wpLink}" target="_blank" onclick="document.getElementById('modalOverlay').classList.add('hidden');" class="modal-btn primary" style="text-decoration:none; text-align:center; width:100%; box-sizing:border-box;">Enviar Comprovante (WhatsApp)</a>
                    <button class="modal-btn secondary" id="mCancel" style="margin-top:8px; width:100%;">Fechar</button>
                `;

                document.getElementById('modalOverlay').classList.remove('hidden');

                document.getElementById('btnCopyPix').onclick = () => {
                    copyToClipboard(pixKey, document.getElementById('btnCopyPix'));
                };

                document.getElementById('btnCopyToken').onclick = () => {
                    copyToClipboard(slotCode, document.getElementById('btnCopyToken'));
                };

                document.getElementById('mCancel').onclick = () => {
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve();
                };
            });
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                const originalBg = btnElement.style.background;
                const originalColor = btnElement.style.color;
                const originalBorder = btnElement.style.borderColor;

                btnElement.innerText = '✅ Copiado!';
                btnElement.style.background = 'var(--emerald)';
                btnElement.style.color = '#fff';
                btnElement.style.borderColor = 'var(--emerald)';

                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = originalBg;
                    btnElement.style.color = originalColor;
                    btnElement.style.borderColor = originalBorder;
                }, 2000);
            });
        }

        function genTimeOptions() {
            let h = '';
            const pulse = 30; // Sempre 30 para flexibilidade no bloqueio
            for (let i = 0; i < 32; i++) {
                const mins = i * pulse;
                const hh = Math.floor(mins / 60).toString().padStart(2, '0');
                const mm = (mins % 60).toString().padStart(2, '0');
                h += `<option value="${i}">${hh}:${mm}</option>`;
            }
            return h;
        }

        // =============================================
        // LÓGICA DE DADOS
        // =============================================
        async function init() {
            if (isSaving) return; // Não recarrega enquanto salva
            setLoading(true);

            try {
                // Adicionamos um timestamp (_t) para evitar cache do navegador (Cache Busting)
                const url = `${CONFIG.API_URL}?pass=${encodeURIComponent(adminPass)}&_t=${Date.now()}`;

                const script = document.createElement('script');
                const callbackName = 'jsonp_cb_' + Math.random().toString(36).substring(7);

                const timeout = setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) script.parentNode.removeChild(script);
                        setLoading(false);
                        showAlert('Tempo Esgotado', 'O servidor demorou a responder. Tente atualizar a página.');
                    }
                }, 12000);

                window[callbackName] = (data) => {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    handleData(data);
                };

                script.onerror = () => {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    setLoading(false);
                    showAlert('Erro de Conexão', 'Não foi possível conectar ao Google Script. Verifique se ele está publicado como "Qualquer pessoa".');
                };

                script.src = `${url}&callback=${callbackName}`;
                document.body.appendChild(script);
            } catch (e) {
                setLoading(false);
                console.error(e);
            }
        }

        function handleData(data) {
            setLoading(false);
            if (data.status === 'OK') {
                agendaData = data.agenda;
                isAdminActive = data.isAdmin;
                if (data.config) scheduleConfig = data.config;

                if (data.serverTime) {
                    serverTimeOffset = new Date(data.serverTime).getTime() - Date.now();
                }

                if (!selectedDayIso) selectedDayIso = toLocalISO(new Date());
                updateAdminUI();
                drawDaysMenu();
                if (!document.getElementById('agenda').classList.contains('hidden')) {
                    renderSlots(selectedDayIso);
                }
                scheduleAutoRefresh();
            } else {
                showAlert('Erro', data.message || 'Erro ao carregar dados.');
            }
        }

        function scheduleAutoRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = setTimeout(init, 30000); // 30s
        }

        function setLoading(val) {
            isLoading = val;
            const loader = document.getElementById('loader');
            const status = document.getElementById('statusText');
            loader.style.display = val ? 'block' : 'none';
            status.textContent = val ? 'SINCRONIZANDO...' : 'SINCRONIZADO';
            status.style.color = val ? 'var(--slate)' : 'var(--emerald)';
        }

        function toggleMultiSelect() {
            isMultiMode = !isMultiMode;
            selectedSlots = [];
            const bulk = document.getElementById('bulkBar');
            const btn = document.getElementById('btnMulti');
            btn.textContent = isMultiMode ? 'MULTI: ON' : 'MULTI: OFF';
            btn.classList.toggle('active', isMultiMode);
            bulk.style.display = isMultiMode ? 'flex' : 'none';
            renderSlots(selectedDayIso);
        }

        async function applyBulkAction(st, cl) {
            if (selectedSlots.length === 0) return;
            const batch = selectedSlots.map(t => ({
                data: selectedDayIso, horario: t, status: st, cliente: cl, telefone: '', password: adminPass
            }));
            await saveUpdates(batch);
            toggleMultiSelect();
        }

        // =============================================
        // SALVAR
        // =============================================
        async function saveUpdates(list) {
            isSaving = true;
            setLoading(true);

            // Atualização Otimista local
            list.forEach(up => {
                const idx = agendaData.findIndex(
                    r => normalizeDate(r.data) === normalizeDate(up.data) && normalizeTime(r.horario) === normalizeTime(up.horario)
                );
                if (idx > -1) {
                    agendaData[idx].status = up.status;
                    agendaData[idx].cliente = up.cliente;
                    agendaData[idx].telefone = up.telefone;
                    if (up.codigo) agendaData[idx].codigo = up.codigo;
                    if (up.duration) agendaData[idx].duration = up.duration;
                }
            });
            renderSlots(selectedDayIso);

            try {
                // Enviamos para o Google via POST (no-cors)
                await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(list)
                });

                // Pequeno delay para o Google processar antes do próximo refresh automático
                setTimeout(() => {
                    isSaving = false;
                    setLoading(false);
                    init(); // Força um refresh real
                }, 1500);

            } catch (err) {
                console.error(err);
                await showAlert('Erro de conexão', 'Não foi possível salvar. Verifique se você está conectado à internet.');
                isSaving = false;
                setLoading(false);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        }

        // Local Storage Theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            document.getElementById('themeToggle').textContent = '☀️';
        }

        // =============================================
        // AUTENTICAÇÃO ADMIN
        // =============================================
        async function doAdminAuth() {
            if (isAdminActive) {
                adminPass = '';
                isAdminActive = false;
                init();
            } else {
                const guess = await showPrompt(
                    'Acesso Restrito',
                    'Digite a senha de administrador:',
                    'Senha',
                    true
                );
                if (guess) {
                    adminPass = guess;
                    isAdminActive = true;
                    init();
                }
            }
        }

        function updateAdminUI() {
            const btn = document.getElementById('admBtn');
            const admStatus = document.getElementById('admStatus');
            const badge = document.getElementById('adminBadge');
            const spacer = document.getElementById('headerSpacer');
            const histBtn = document.getElementById('historyBtnContainer');

            if (isAdminActive) {
                document.body.classList.add('admin-mode');
                btn.innerHTML = '🔓 SAIR';
                btn.classList.add('active');
                admStatus.style.display = 'flex';
                badge.style.display = 'inline-block';
                spacer.style.display = 'none';
                if (histBtn) histBtn.style.display = 'block';
            } else {
                document.body.classList.remove('admin-mode');
                btn.innerHTML = '🔒';
                btn.classList.remove('active');
                admStatus.style.display = 'none';
                badge.style.display = 'none';
                spacer.style.display = '';
                if (histBtn) histBtn.style.display = 'none';
                if (viewingHistory) toggleHistoryView();
            }
        }

        // =============================================
        // CONFIGURAÇÕES DO SISTEMA (ADMIN)
        // =============================================
        async function showSettingsModal() {
            _setupModal('Ajustes da Agenda', 'Configure o horário de funcionamento e a duração de cada vaga.');

            document.getElementById('modalBody').innerHTML = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <div>
                        <label style="font-size:0.7rem; font-weight:700; color:var(--pink);">HORA DE INÍCIO (HH:MM)</label>
                        <input type="time" id="cfgStart" class="modal-input" value="${scheduleConfig.start}">
                    </div>
                    <div>
                        <label style="font-size:0.7rem; font-weight:700; color:var(--pink);">HORA DE TÉRMINO (HH:MM)</label>
                        <input type="time" id="cfgEnd" class="modal-input" value="${scheduleConfig.end}">
                    </div>
                    <div>
                        <label style="font-size:0.7rem; font-weight:700; color:var(--pink);">DURAÇÃO DE CADA VAGA (MINUTOS)</label>
                        <select id="cfgDuration" class="modal-input">
                            <option value="30"  ${scheduleConfig.duration == 30 ? 'selected' : ''}>30 minutos</option>
                            <option value="60"  ${scheduleConfig.duration == 60 ? 'selected' : ''}>1 hora</option>
                            <option value="90"  ${scheduleConfig.duration == 90 ? 'selected' : ''}>1 hora e 30 min</option>
                            <option value="120" ${scheduleConfig.duration == 120 ? 'selected' : ''}>2 horas</option>
                            <option value="180" ${scheduleConfig.duration == 180 ? 'selected' : ''}>3 horas</option>
                        </select>
                    </div>
                    <p style="font-size:0.65rem; color:var(--slate); margin-top:5px; line-height:1.4;">
                        ⚠️ Nota: Alterar a duração ou início pode fazer com que agendamentos antigos não se alinhem mais com a grade visual.
                    </p>
                </div>
            `;

            document.getElementById('modalActions').innerHTML = `
                <button class="modal-btn secondary" id="mCancel">Cancelar</button>
                <button class="modal-btn primary"   id="mSave">Salvar Ajustes</button>
            `;

            document.getElementById('modalOverlay').classList.remove('hidden');

            document.getElementById('mCancel').onclick = () => {
                document.getElementById('modalOverlay').classList.add('hidden');
            };

            document.getElementById('mSave').onclick = async () => {
                const newCfg = {
                    start: document.getElementById('cfgStart').value,
                    end: document.getElementById('cfgEnd').value,
                    duration: parseInt(document.getElementById('cfgDuration').value)
                };

                await saveConfig(newCfg);
                document.getElementById('modalOverlay').classList.add('hidden');
            };
        }

        async function saveConfig(newCfg) {
            setLoading(true);
            try {
                await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify([{
                        action: 'update_config',
                        config: newCfg,
                        password: adminPass
                    }])
                });

                // Atualiza local e recarrega
                scheduleConfig = newCfg;
                setTimeout(() => {
                    init();
                }, 1000);

            } catch (err) {
                console.error(err);
                showAlert('Erro', 'Falha ao salvar configurações no servidor.');
                setLoading(false);
            }
        }

        window.onload = init;
    </script>
</body>
