<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOK DESIGNER | Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --primary: #CD8B8B;
            --primary-soft: rgba(205, 139, 139, 0.15);
            --pink: #CD8B8B;
            --accent: #B38600;
            --bg: #FDF9F8;
            --text: #4A403A;
            --slate: #7A726E;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --border: rgba(205, 139, 139, 0.2);
            --shadow: 0 10px 30px rgba(74, 64, 58, 0.08);
            --status-free: #6DB381;
            --status-busy: #CD8B8B;
            --status-pend: #B38600;
            --status-lock: #999;
            --admin-glow: transparent;
        }

        body.dark-theme {
            --bg: #1A1716;
            --text: #EBE4E0;
            --slate: #A59B96;
            --glass-bg: rgba(45, 38, 36, 0.85);
            --border: rgba(205, 139, 139, 0.3);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --primary-soft: rgba(205, 139, 139, 0.2);
        }

        body.admin-vip {
            --admin-glow: rgba(205, 139, 139, 0.4);
            border: 6px solid var(--pink);
            box-shadow: inset 0 0 100px var(--admin-glow);
        }

        body.admin-vip::after {
            content: "MODO ADMINISTRADOR ATIVO";
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            background: var(--pink); color: white; padding: 2px 20px;
            font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;
            border-radius: 0 0 10px 10px; z-index: 9999; animation: pulseBanner 2s infinite;
        }

        @keyframes pulseBanner { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(205, 139, 139, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(179, 134, 0, 0.03) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.4s, color 0.4s, border 0.4s;
        }

        .app { max-width: 480px; margin: 0 auto; padding-bottom: 120px; transition: 0.5s; }
        header { text-align: center; padding: 50px 20px 20px; position: relative; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.2rem; letter-spacing: 5px; font-weight: 300; line-height: 0.9; cursor: pointer; animation: fadeInDown 1s ease-out; }
        h1 span { display: block; font-family: 'Outfit', sans-serif; font-size: 0.9rem; letter-spacing: 8px; font-weight: 400; color: var(--slate); margin-top: 10px; opacity: 0.7; }

        .theme-toggle { position: absolute; right: 25px; top: 45px; font-size: 1.4rem; cursor: pointer; opacity: 0.6; transition: 0.3s; z-index: 10; }
        .theme-toggle:hover { opacity: 1; transform: rotate(15deg); }

        /* Day Picker Horizontal */
        .dash-controls { padding: 0 20px 20px; animation: fadeInUp 0.8s ease-out 0.2s backwards; }
        .day-nav { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .day-scroller { display: flex; overflow-x: auto; gap: 12px; padding: 10px 5px 20px; scrollbar-width: none; flex: 1; }
        .day-scroller::-webkit-scrollbar { display: none; }

        .btn-week { background: var(--glass-bg); border: 1px solid var(--border); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--pink); font-weight: 700; transition: 0.3s; flex-shrink: 0; box-shadow: var(--shadow); }
        .btn-week:hover { background: var(--pink); color: white; border-color: var(--pink); }

        .day-box {
            min-width: 85px; background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 24px; padding: 22px 10px;
            text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .day-box:hover { transform: translateY(-3px); border-color: var(--pink); }
        .day-box.active { background: var(--pink); border-color: var(--pink); color: white; box-shadow: 0 10px 25px rgba(205,139,139,0.3); }
        .day-box .dow { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; opacity: 0.7; }
        .day-box .num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin: 4px 0; }
        .day-box .month { font-size: 0.65rem; font-weight: 700; opacity: 0.8; }

        /* Agenda Grid */
        .agenda-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 0 20px; }
        .slot-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: 20px;
            padding: 20px; display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.4s; box-shadow: var(--shadow);
            border-left: 6px solid var(--status-free); animation: cardEntrance 0.6s ease-out backwards;
        }
        .slot-card:hover { transform: scale(1.02); background: white; border-color: var(--pink); }
        .slot-time { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--primary); min-width: 65px; border-right: 1px dashed var(--border); }
        .slot-body { flex: 1; }
        .slot-st { font-size: 0.6rem; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 2px; }
        .slot-cl { font-size: 0.95rem; font-weight: 600; color: var(--text); }

        /* Status Colors */
        .c-free { color: var(--status-free); } .c-busy { color: var(--status-busy); } 
        .c-pend { color: var(--status-pend); } .c-lock { color: var(--status-lock); }
        .b-free { border-left-color: var(--status-free); } .b-busy { border-left-color: var(--status-busy); }
        .b-pend { border-left-color: var(--status-pend); } .b-lock { border-left-color: var(--status-lock); }
        .slot-card.selected { border-width: 2px; border-style: solid; border-color: var(--pink); box-shadow: 0 10px 30px rgba(205,139,139,0.2); }

        /* Admin & History FAB */
        .fab-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); padding: 10px 20px; border-radius: 50px; border: 1px solid white; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .fab { background: var(--pink); color: white; border: none; padding: 10px 18px; border-radius: 25px; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .fab.secondary { background: white; color: var(--text); border: 1px solid var(--border); }

        /* Modals */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74, 64, 58, 0.4); backdrop-filter: blur(5px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .modal { background: white; width: 100%; max-width: 390px; border-radius: 28px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); animation: modalIn 0.5s cubic-bezier(0.19, 1, 0.22, 1); color: #4A403A; }
        .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .modal-input { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 12px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s; background: white; color: black; }
        .modal-input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--primary-soft); }
        .modal-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 8px; font-size: 0.9rem; }
        .modal-btn.primary { background: var(--pink); color: white; }
        .modal-btn.secondary { background: #F0F0F0; color: #4A403A; }

        /* Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; transition: 0.5s; }
        .pulse-logo { width: 85px; height: 85px; background: white; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 2.22rem; color: var(--pink); box-shadow: var(--shadow); animation: pulseLD 2s infinite; font-weight: 600; }
        @keyframes pulseLD { 
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(205, 139, 139, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(205, 139, 139, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(205, 139, 139, 0); }
        }

        .hidden { display: none !important; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes cardEntrance { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .whatsapp-btn { display: inline-block; margin-top: 8px; text-decoration: none; background: rgba(37, 211, 102, 0.1); color: #25D366; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; border: 1px solid rgba(37, 211, 102, 0.2); }
        .reserve-cta { font-weight: 700; font-size: 0.8rem; color: var(--pink); letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="pulse-logo">LD</div>
        <div id="loaderText" style="font-size:0.65rem; letter-spacing:2px; font-weight:700; color:var(--slate);">SINCRONIZANDO...</div>
    </div>

    <div class="app" id="appBody">
        <header>
            <div id="adminBadge" onclick="doAdminAuth()" style="cursor:pointer; font-size:1.5rem; position:absolute; left:25px; top:45px; opacity:0.3; transition:0.3s;" title="Acesso Admin">🔒</div>
            <div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</div>
            <h1 onclick="window.location.reload()">LOOK<span>DESIGNER</span></h1>
        </header>

        <section class="dash-controls">
            <p style="font-size:0.65rem; font-weight:800; color:var(--slate); margin-bottom:10px; letter-spacing:3px; text-transform:uppercase;">Selecione um dia</p>
            <div class="day-nav">
                <button class="btn-week hidden" id="btnPrevWeek" onclick="changeWeek(-7)">‹</button>
                <div class="day-scroller" id="dayContainer"></div>
                <button class="btn-week hidden" id="btnNextWeek" onclick="changeWeek(7)">›</button>
            </div>
        </section>

        <main id="mainGrid" class="hidden">
            <div style="padding:0 22px 10px; display:flex; justify-content:space-between; align-items:center;">
                <h3 id="dateTitle" style="font-family:'Playfair Display', serif; font-size:1.4rem; font-style:italic;">Data Selecionada</h3>
                <button onclick="closeAgenda()" style="background:transparent; border:none; color:var(--pink); font-weight:700; font-size:0.8rem; cursor:pointer;">OUTRO DIA</button>
            </div>
            <div id="slotsContainer" class="agenda-grid"></div>
        </main>
    </div>

    <div id="modalOverlay" class="hidden">
        <div class="modal">
            <h2 class="modal-title" id="modalTitle"></h2>
            <p id="modalDesc" style="font-size: 0.9rem; color: var(--slate); margin-bottom: 20px; line-height:1.4;"></p>
            <div id="modalBody"></div>
            <div id="modalActions" class="modal-actions"></div>
        </div>
    </div>

    <div id="adminFab" class="fab-container hidden">
        <button class="fab" onclick="showSettingsModal()">⚙️ CONFIGS</button>
        <button class="fab secondary" onclick="init()">⚡ ATUALIZAR</button>
    </div>

    <script>
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbxewOegi1-rnQwTEieU5hJAHVDuk5kh38rjRU4CJOqMAWOv2fxicwux96U1XR9HsvU6/exec",
            PIX_KEY: "62993362375",
            PIX_HOLDER: "Camila Alves de Lima",
            PIX_BANK: "NUBANK",
            PIX_VALUE: "R$ 25,00",
            WA_PHONE: "559296150540"
        };

        const VALIDATOR = {
            time: (t) => {
                if (!t) return "08:00";
                const m = t.toString().match(/(\d{1,2}:\d{2})/);
                return m ? m[1].padStart(5, '0') : "08:00";
            }
        };

        let agendaData = [], scheduleConfig = { start: '08:00', end: '20:00', duration: 60 };
        let adminPass = "", isAdminActive = false, selectedDayIso = "", currentWeekOffset = 0;

        function toLocalISO(date) { return date.getFullYear()+'-'+(date.getMonth()+1).toString().padStart(2,'0')+'-'+date.getDate().toString().padStart(2,'0'); }
        function normalizeDate(d) { return d ? d.toString().substring(0,10) : ""; }
        function normalizeTime(t) { return t ? t.toString().substring(0,5) : ""; }

        async function init() {
            setLoading(true);
            try {
                const url = `${CONFIG.API_URL}?pass=${encodeURIComponent(adminPass)}&_t=${Date.now()}`;
                const script = document.createElement('script');
                const cb = 'h_' + Date.now();
                window[cb] = (data) => {
                    delete window[cb];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    if (data.status === 'OK') {
                        agendaData = data.agenda || [];
                        if (data.config) scheduleConfig = data.config;
                        isAdminActive = data.isAdmin || false;
                        updateUI();
                    }
                    setLoading(false);
                };
                script.src = `${url}&callback=${cb}`;
                document.body.appendChild(script);
            } catch(e) { setLoading(false); }
        }

        function updateUI() {
            if (isAdminActive) {
                document.body.classList.add('admin-vip');
                document.getElementById('adminFab').classList.remove('hidden');
                document.getElementById('btnPrevWeek').classList.remove('hidden');
                document.getElementById('btnNextWeek').classList.remove('hidden');
            }
            drawDaysMenu();
            if (selectedDayIso) renderSlots(selectedDayIso);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('look_theme', isDark ? 'dark' : 'light');
        }

        function changeWeek(offset) {
            currentWeekOffset += offset;
            drawDaysMenu();
        }

        function drawDaysMenu() {
            const container = document.getElementById('dayContainer');
            container.innerHTML = '';
            const now = new Date();
            for(let i=0; i<14; i++) {
                const d = new Date();
                d.setDate(now.getDate() + i + currentWeekOffset);
                const iso = toLocalISO(d);
                const card = document.createElement('div');
                card.className = `day-box ${iso === selectedDayIso ? 'active' : ''}`;
                card.onclick = () => selectDay(iso);
                card.innerHTML = `
                    <div class="dow">${d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','')}</div>
                    <div class="num">${d.getDate()}</div>
                    <div class="month">${d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
                `;
                container.appendChild(card);
            }
        }

        function selectDay(iso) { 
            selectedDayIso = iso; drawDaysMenu(); 
            const d = new Date(iso + 'T12:00:00');
            const fmt = d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit' });
            document.getElementById('dateTitle').textContent = fmt.charAt(0).toUpperCase() + fmt.slice(1);
            document.getElementById('mainGrid').classList.remove('hidden');
            renderSlots(iso);
        }
        function closeAgenda() { document.getElementById('mainGrid').classList.add('hidden'); selectedDayIso = ""; drawDaysMenu(); }

        function renderSlots(iso) {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            const now = new Date(), todayIso = toLocalISO(now);
            const curMins = (now.getHours() * 60) + now.getMinutes();

            const [sH, sM] = VALIDATOR.time(scheduleConfig.start).split(':').map(Number);
            const [eH, eM] = VALIDATOR.time(scheduleConfig.end).split(':').map(Number);
            let cur = sH*60 + sM, end = eH*60 + eM;

            if (cur >= end) {
                container.innerHTML = `<div style="padding:40px; text-align:center; opacity:0.6;">✧ Expediente encerrado ✧</div>`;
                return;
            }

            while(cur < end) {
                const t = `${Math.floor(cur/60).toString().padStart(2,'0')}:${(cur%60).toString().padStart(2,'0')}`;
                const isPast = (iso < todayIso) || (iso === todayIso && cur < curMins);
                const reg = agendaData.find(r => normalizeDate(r.data)===iso && normalizeTime(r.horario)===t);
                
                let st = reg ? reg.status : 'Livre';
                let blockDur = reg ? parseInt(reg.duration || scheduleConfig.duration) : scheduleConfig.duration;

                if (st === 'Livre') {
                    const nextReg = agendaData
                        .filter(r => normalizeDate(r.data) === iso && r.status !== 'Livre')
                        .map(r => { const [h, m] = r.horario.split(':').map(Number); return h * 60 + m; })
                        .filter(m => m > cur).sort((a,b)=>a-b)[0];
                    if (nextReg) blockDur = Math.min(blockDur, nextReg - cur);
                }

                const card = document.createElement('div');
                let colorClass = 'c-free', bClass = 'b-free', displayStatus = st;
                if (st === 'Ocupado') { colorClass = 'c-busy'; bClass = 'b-busy'; }
                else if (st === 'Bloqueado') { colorClass = 'c-lock'; bClass = 'b-lock'; }
                else if (st === 'Aguardando Pagamento') { colorClass = 'c-pend'; bClass = 'b-pend'; displayStatus = "RESERVADO (PIX)"; }

                card.className = `slot-card ${bClass}`;
                if (isPast) {
                    card.style.opacity = '0.35';
                    if (!isAdminActive) {
                        card.style.pointerEvents = 'none';
                        displayStatus = "INDISPONÍVEL";
                        colorClass = 'c-lock';
                    }
                }
                card.onclick = () => onSlotClick(iso, t, st);

                let clHtml = reg ? reg.cliente : (isPast ? 'Encerrado' : '<span class="reserve-cta">✦ Reservar</span>');
                if (isAdminActive && reg && reg.telefone) {
                    clHtml += `<br><a href="https://wa.me/55${reg.telefone}" target="_blank" class="whatsapp-btn" onclick="event.stopPropagation()">📱 CONTATO</a>`;
                }

                card.innerHTML = `<div class="slot-time">${t}</div><div class="slot-body"><div class="slot-st ${colorClass}">${displayStatus}</div><div class="slot-cl">${clHtml}</div></div>`;
                container.appendChild(card);
                cur += Math.max(30, blockDur);
            }
        }

        async function onSlotClick(d, t, s) {
            if (!isAdminActive) {
                if (s !== 'Livre') return;
                const res = await showBookingPrompt('Novo Agendamento', `Horário: ${t}`);
                if (!res) return;
                const slotCode = (Date.now().toString(36).slice(-4) + Math.random().toString(36).substr(2, 4)).toUpperCase();
                await saveUpdates([{
                    data:d, horario:t, status:'Aguardando Pagamento', cliente:res.nome, telefone:res.telefone,
                    codigo:slotCode, bookingTime:new Date().toISOString(), duration:scheduleConfig.duration, password:adminPass
                }]);
                await showPixModal(res.nome, `${d} às ${t}`, slotCode);
            } else {
                const action = await showActionSheet('Painel Admin', `Horário: ${t}`, [
                    {label: s==='Livre'?'🔒 Bloquear':'🔓 Liberar', value: s==='Livre'?'bloquear':'liberar'},
                    {label: '📝 Registro Manual', value: 'manual'}
                ]);
                if (action === 'bloquear') await saveUpdates([{data:d, horario:t, status:'Bloqueado', cliente:'RESERVADO', password:adminPass}]);
                if (action === 'liberar') await saveUpdates([{data:d, horario:t, status:'Livre', password:adminPass}]);
                if (action === 'manual') {
                    const r = await showBookingPrompt('Admin: Novo Registro', 'Dados do cliente:');
                    if (r) await saveUpdates([{data:d, horario:t, status:'Ocupado', cliente:r.nome, telefone:r.telefone, duration:r.duration, password:adminPass}]);
                }
            }
        }

        async function showSettingsModal() {
            _setup('Configurações', 'Expediente e Duração padrão:');
            document.getElementById('modalBody').innerHTML = `
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1;"><label style="font-size:0.6rem; font-weight:700; color:var(--pink);">INÍCIO</label><input id="cfgStart" value="${scheduleConfig.start}" class="modal-input"></div>
                    <div style="flex:1;"><label style="font-size:0.6rem; font-weight:700; color:var(--pink);">FIM</label><input id="cfgEnd" value="${scheduleConfig.end}" class="modal-input"></div>
                </div>
                <label style="font-size:0.6rem; font-weight:700; color:var(--pink);">DURAÇÃO PADRÃO (MIN)</label>
                <select id="cfgDur" class="modal-input">
                    <option value="30" ${scheduleConfig.duration==30?'selected':''}>30 min</option>
                    <option value="60" ${scheduleConfig.duration==60?'selected':''}>1 hora</option>
                    <option value="90" ${scheduleConfig.duration==90?'selected':''}>1h 30m</option>
                    <option value="120" ${scheduleConfig.duration==120?'selected':''}>2 horas</option>
                </select>
            `;
            document.getElementById('modalActions').innerHTML = `<button class="modal-btn secondary" onclick="document.getElementById('modalOverlay').classList.add('hidden')">Cancelar</button><button class="modal-btn primary" id="btnSaveCfg">Salvar</button>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('btnSaveCfg').onclick = async () => {
                const s = document.getElementById('cfgStart').value, e = document.getElementById('cfgEnd').value, d = parseInt(document.getElementById('cfgDur').value);
                await saveUpdates([{ action: "update_config", config: { start: s, end: e, duration: d }, password: adminPass }]);
                document.getElementById('modalOverlay').classList.add('hidden');
            };
        }

        async function saveUpdates(updates) {
            setLoading(true);
            try {
                await fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ updates, password: adminPass }) });
                await new Promise(r => setTimeout(r, 2000));
                await init();
            } finally { setLoading(false); }
        }

        async function doAdminAuth() {
            const p = prompt('Senha administrativa:');
            if (p) { adminPass = p; init(); }
        }

        function showBookingPrompt(title, desc) {
            return new Promise(resolve => {
                _setup(title, desc);
                let html = `<input id="mNome" placeholder="Nome" class="modal-input"><input id="mTel" placeholder="WhatsApp" class="modal-input">`;
                if (isAdminActive) html += `<label style="font-size:0.6rem;">DURAÇÃO (MIN)</label><input id="mDur" type="number" value="${scheduleConfig.duration}" class="modal-input">`;
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modalActions').innerHTML = `<button class="modal-btn secondary" id="mCan">Voltar</button><button class="modal-btn primary" id="mOk">Avançar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('mOk').onclick = () => {
                    const n = document.getElementById('mNome').value, t = document.getElementById('mTel').value;
                    const d = isAdminActive ? parseInt(document.getElementById('mDur').value) : scheduleConfig.duration;
                    document.getElementById('modalOverlay').classList.add('hidden');
                    resolve(n && t ? {nome:n, telefone:t, duration:d} : null);
                };
                document.getElementById('mCan').onclick = () => { document.getElementById('modalOverlay').classList.add('hidden'); resolve(null); };
            });
        }

        function showPixModal(nome, dataEx, code) {
            return new Promise(resolve => {
                _setup('Pagamento', 'IMPORTANTE: Para concluir o agendamento é necessário pagar a taxa e enviar o comprovante.');
                document.getElementById('modalBody').innerHTML = `
                    <div style="background:var(--primary-soft); padding:20px; border-radius:20px; text-align:center; border: 1px dashed var(--pink);">
                        <p style="font-size:1.4rem; font-weight:700;">${CONFIG.PIX_KEY}</p>
                        <p style="font-size:0.7rem;">${CONFIG.PIX_BANK} - ${CONFIG.PIX_HOLDER}</p>
                        <button class="modal-btn primary" onclick="navigator.clipboard.writeText('${CONFIG.PIX_KEY}'); alert('Copiado!')">COPIAR CHAVE PIX</button>
                    </div>
                    <div style="margin-top:20px; text-align:center;">
                        <p style="font-size:0.7rem;">Token: <b>${code}</b></p>
                        <a href="https://wa.me/${CONFIG.WA_PHONE}?text=Olá Camila! Agendamento: ${nome} p/ ${dataEx}. Segue o comprovante. Token: ${code}" target="_blank" class="modal-btn primary" style="display:block; text-decoration:none; background:#25D366;">ENVIAR COMPROVANTE</a>
                    </div>
                `;
                document.getElementById('modalActions').innerHTML = `<button class="modal-btn secondary" onclick="document.getElementById('modalOverlay').classList.add('hidden'); resolve()">Fechar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
            });
        }

        function _setup(t, d) { document.getElementById('modalTitle').textContent=t; document.getElementById('modalDesc').textContent=d; document.getElementById('modalBody').innerHTML=''; }
        function showActionSheet(t, d, c) { return new Promise(resolve => { _setup(t,d); const b = document.getElementById('modalBody'); c.forEach(x => { const d = document.createElement('div'); d.className = 'modal-btn secondary'; d.textContent = x.label; d.style.textAlign = 'center'; d.onclick = () => { document.getElementById('modalOverlay').classList.add('hidden'); resolve(x.value); }; b.appendChild(d); }); document.getElementById('modalOverlay').classList.remove('hidden'); }); }
        function setLoading(v) { document.getElementById('loader').classList.toggle('hidden', !v); }

        window.onload = () => {
            if (localStorage.getItem('look_theme') === 'dark') toggleTheme();
            init();
        };
    </script>
</body>
</html>
