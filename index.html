<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOK DESIGNER | Aura Edition</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Aura Palette (Leveza) */
            --bg-aura: #F8F9FD;
            --accent-main: #9B9EED; /* Soft Lavender */
            --accent-mint: #B5C9C1; /* Soft Mint */
            --text-deep: #434455;
            --text-light: #7E7F91;
            --glass-base: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-float: 0 20px 40px rgba(155, 158, 237, 0.08);
            --ease-aura: cubic-bezier(0.23, 1, 0.32, 1);
            
            /* Status Colors */
            --st-free: #95C9A4;
            --st-busy: #E8A8B6;
            --st-pend: #F5D547;
            --st-lock: #D1D1D6;
        }

        /* Animated Mesh Background (Aura Viva) */
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #F8F9FD, #E6E9FC, #F1F4FF, #F8F9FD);
            background-size: 400% 400%;
            animation: auraMorph 15s ease infinite;
            color: var(--text-deep);
            min-height: 100vh; margin: 0; padding: 0;
            overflow-x: hidden; transition: 0.5s;
        }

        @keyframes auraMorph {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dashboard Executive Access (Typo Fixed) */
        body.admin-mode {
            --bg-aura: #1E1E2E;
            --text-deep: #F8F9FD;
            --glass-base: rgba(40, 42, 54, 0.8);
            --accent-main: #BD93F9;
        }
        body.admin-mode::before {
            content: "EXECUTIVE DASHBOARD ACCESS";
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-main), var(--accent-mint), var(--accent-main));
            z-index: 10000; display: block; text-align: center; font-size: 0.5rem; letter-spacing: 5px; color: white; padding: 1px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* Smooth Aura Intro */
        #auraIntro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: opacity 1.2s ease-out, visibility 1.2s;
        }
        #auraIntro.fade { opacity: 0; visibility: hidden; }
        .aura-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; color: var(--accent-main); opacity: 0; animation: textFade 4s forwards; }
        @keyframes textFade { 0% { opacity: 0; transform: scale(0.95); } 30% { opacity: 1; transform: scale(1); } 70% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.05); } }

        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; position: relative; width: 100%; }

        header { padding: 40px 0; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 300; letter-spacing: 12px; color: var(--text-deep); text-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .logo span { font-weight: 700; color: var(--accent-main); }

        /* Interactive Day List */
        .day-bar { margin: 20px 0 40px; }
        .day-scroller { display: flex; overflow-x: auto; gap: 18px; padding: 10px 5px 30px; scrollbar-width: none; }
        .day-scroller::-webkit-scrollbar { display: none; }
        
        .day-item {
            min-width: 70px; height: 95px; border-radius: 25px;
            background: var(--glass-base); backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.6s var(--ease-aura); box-shadow: var(--shadow-float);
        }
        .day-item.active {
            background: #fff; transform: translateY(-10px) scale(1.1);
            border-color: var(--accent-main); box-shadow: 0 30px 60px rgba(155, 158, 237, 0.2);
        }
        .day-item .dw { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); }
        .day-item .dn { font-size: 1.6rem; font-weight: 700; margin: 2px 0; }

        /* Aura Glass Grid */
        .grid-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 20px; font-family: 'Playfair Display', serif; }
        .grid-header h3 { font-size: 1.5rem; font-style: italic; }
        .close-btn { font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 700; color: var(--accent-main); cursor: pointer; letter-spacing: 2px; }

        .slots-box { display: grid; gap: 15px; perspective: 1000px; padding-bottom: 150px; }
        .slot-glass {
            background: var(--glass-base); backdrop-filter: blur(30px);
            border: 2px solid var(--glass-border); border-radius: 22px;
            padding: 22px; display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.5s var(--ease-aura);
            animation: slotPulse 1s var(--ease-aura) backwards;
        }
        .slot-glass:hover { transform: translateY(-5px) scale(1.02); background: #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        @keyframes slotPulse { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .time-label { font-size: 1.5rem; font-weight: 700; color: var(--accent-main); opacity: 0.9; width: 80px; text-align: center; border-right: 1px solid rgba(0,0,0,0.03); }
        .slot-details { flex: 1; }
        .status-badge { font-size: 0.55rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
        .client-name { font-size: 1.1rem; font-weight: 600; }
        .countdown { display: inline-block; background: var(--accent-main); color: white; padding: 4px 8px; border-radius: 8px; font-size: 0.6rem; margin-top: 8px; font-weight: 700; animation: auraPulse 2s infinite; }
        @keyframes auraPulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* Floating Nav Aura */
        .bottom-nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(30px);
            border-radius: 50px; padding: 12px 30px; display: flex; gap: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); z-index: 5000; border: 2px solid #fff;
        }
        .nav-link { background: none; border: none; font-weight: 700; font-size: 0.75rem; color: var(--text-deep); cursor: pointer; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        /* Modern Bottom Sheet */
        .overlay-sheet {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(155, 158, 237, 0.15); backdrop-filter: blur(15px);
            z-index: 9000; display: flex; align-items: flex-end; justify-content: center;
        }
        .aura-modal {
            background: #fff; width: 100%; max-width: 480px; border-radius: 40px 40px 0 0;
            padding: 40px; box-shadow: 0 -30px 100px rgba(0,0,0,0.15);
            animation: auraSheet 0.7s var(--ease-aura);
        }
        @keyframes auraSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .aura-input {
            width: 100%; padding: 20px 25px; border-radius: 20px; border: 2px solid var(--bg-aura);
            background: var(--bg-aura); font-family: inherit; font-size: 1rem; margin-bottom: 20px;
            outline: none; transition: 0.3s;
        }
        .aura-input:focus { border-color: var(--accent-main); background: #fff; }
        .aura-btn { width: 100%; padding: 22px; border-radius: 20px; border: none; cursor: pointer; font-weight: 700; letter-spacing: 1px; font-size: 1rem; transition: 0.4s; }
        .aura-btn-primary { background: var(--accent-main); color: white; box-shadow: 0 15px 30px rgba(155, 158, 237, 0.4); }
        .aura-btn-primary:active { transform: scale(0.97); }
        .aura-btn-secondary { background: #F0F0F5; color: var(--text-deep); }

        .wa-btn { display: block; text-align: center; background: #25D366; color: white; text-decoration: none; padding: 22px; border-radius: 20px; font-weight: 700; margin-top: 25px; box-shadow: 0 15px 40px rgba(37, 211, 102, 0.3); }

        .hidden { display: none !important; }
        .pill-past { opacity: 0.25; filter: grayscale(0.8); pointer-events: none; }
    </style>
</head>
<body>

    <!-- Intro Viva -->
    <div id="auraIntro">
        <div class="aura-text">"Sua beleza em harmonia..." ✨</div>
    </div>

    <div class="app-container">
        <header>
            <div id="adminKey" onclick="doDashAuth()" style="position:absolute; left:20px; top:40px; opacity:0.1; cursor:pointer;">🔑</div>
            <div class="logo">LOOK<span>DESIGNER</span></div>
        </header>

        <!-- Aura Day Picker -->
        <section class="day-bar">
            <h5 style="font-size:0.55rem; letter-spacing:5px; font-weight:800; color:var(--accent-main); text-transform:uppercase; margin-bottom:20px; text-align:center;">Agende seu momento de leveza</h5>
            <div class="day-scroller" id="dayContainer"></div>
        </section>

        <!-- Dynamic Grid -->
        <main id="mainAgenda" class="hidden">
            <div class="grid-header">
                <h3 id="dateLabel">Dando forma à sua aura</h3>
                <span class="close-btn" onclick="closeGrid()">VOLTAR</span>
            </div>
            <div id="slotsGrid" class="slots-box"></div>
        </main>
    </div>

    <!-- Bottom Sheet Aura -->
    <div id="modalOverlay" class="hidden">
        <div class="aura-modal">
            <h2 id="mTitle" style="font-family:'Playfair Display', serif; font-size:1.8rem; margin-bottom:10px;"></h2>
            <p id="mDesc" style="font-size:0.85rem; color:var(--text-light); margin-bottom:30px; line-height:1.6;"></p>
            <div id="mBody"></div>
            <div id="mActions"></div>
        </div>
    </div>

    <!-- Aura Nav Admin -->
    <div id="adminNav" class="bottom-nav hidden">
        <button class="nav-link" onclick="openAuraConfig()">⚙️ Ajustes</button>
        <button class="nav-link" onclick="init()">⚡ Sincronizar</button>
    </div>

    <script>
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbxewOegi1-rnQwTEieU5hJAHVDuk5kh38rjRU4CJOqMAWOv2fxicwux96U1XR9HsvU6/exec",
            PIX_KEY: "62993362375",
            PIX_HOLDER: "Camila Alves de Lima",
            PIX_BANK: "NUBANK",
            WA_PHONE: "559296150540",
            RESERVE_MINS: 20
        };

        let db = [], cfg = { start: '08:00', end: '20:00', duration: 60 };
        let admKey = "", isAdmin = false, currentDay = "";

        // Intro Control
        setTimeout(() => { 
            const intro = document.getElementById('auraIntro');
            if(intro) intro.classList.add('fade'); 
        }, 3500);

        async function init() {
            try {
                const cb = 'aura_' + Date.now();
                const script = document.createElement('script');
                window[cb] = (r) => {
                    delete window[cb]; script.remove();
                    if (r.status === 'OK') {
                        db = r.agenda || [];
                        cfg = r.config || cfg;
                        isAdmin = r.isAdmin || false;
                        updateApp();
                    }
                };
                script.src = `${CONFIG.API_URL}?pass=${encodeURIComponent(admKey)}&_t=${Date.now()}&callback=${cb}`;
                document.body.appendChild(script);
            } catch(e) {}
        }

        function updateApp() {
            if (isAdmin) {
                document.body.classList.add('admin-mode');
                document.getElementById('adminNav').classList.remove('hidden');
            }
            renderDays();
            if (currentDay) renderGrid(currentDay);
        }

        function renderDays() {
            const container = document.getElementById('dayContainer');
            container.innerHTML = '';
            const now = new Date();
            for(let i=0; i<14; i++) {
                const d = new Date(); d.setDate(now.getDate() + i);
                const iso = d.toISOString().split('T')[0];
                const el = document.createElement('div');
                el.className = `day-item ${iso === currentDay ? 'active' : ''}`;
                el.onclick = () => selectDay(iso);
                el.innerHTML = `<div class="dw">${d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','')}</div><div class="dn">${d.getDate()}</div><div class="dw">${d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>`;
                container.appendChild(el);
            }
        }

        function selectDay(iso) {
            currentDay = iso;
            renderDays();
            const dObj = new Date(iso + 'T12:00:00');
            const fmt = dObj.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit' });
            document.getElementById('dateLabel').textContent = fmt.charAt(0).toUpperCase() + fmt.slice(1);
            document.getElementById('mainAgenda').classList.remove('hidden');
            renderGrid(iso);
        }
        function closeGrid() { document.getElementById('mainAgenda').classList.add('hidden'); currentDay = ""; renderDays(); }

        function renderGrid(iso) {
            const grid = document.getElementById('slotsGrid');
            grid.innerHTML = '';
            const now = new Date(), todayIso = now.toISOString().split('T')[0];
            const curT = now.getHours()*60 + now.getMinutes();

            const [sH, sM] = (cfg.start || "08:00").split(':').map(Number);
            const [eH, eM] = (cfg.end || "20:00").split(':').map(Number);
            let cur = sH*60 + sM, end = eH*60 + eM;

            let idx = 0;
            while(cur < end) {
                const clock = `${Math.floor(cur/60).toString().padStart(2,'0')}:${(cur%60).toString().padStart(2,'0')}`;
                const isPast = (iso < todayIso) || (iso === todayIso && cur < curT);
                const reg = db.find(r => r.data.toString().substring(0,10) === iso && r.horario.toString().substring(0,5) === clock);
                
                let st = reg ? reg.status : 'Livre';
                let dur = reg ? parseInt(reg.duration || 60) : cfg.duration;
                let reservedUntil = reg ? reg.reservedUntil : null;
                
                // Smart 20-min Check
                let isExpired = false;
                if (st === 'Aguardando Pagamento' && reservedUntil) {
                    if (new Date() > new Date(reservedUntil)) isExpired = true;
                }

                if (st === 'Aguardando Pagamento' && isExpired && !isAdmin) st = 'Livre';

                if (st === 'Livre') {
                    const next = db.filter(r => r.data.toString().substring(0,10) === iso && r.status !== 'Livre')
                                   .map(r => { const [h,m] = r.horario.split(':').map(Number); return h*60+m; })
                                   .filter(m => m > cur).sort((a,b)=>a-b)[0];
                    if (next) {
                        const gap = next - cur;
                        if (gap < dur) dur = gap;
                    }
                }

                const card = document.createElement('div');
                card.className = `slot-glass ${isPast ? 'pill-past' : ''}`;
                card.style.animationDelay = `${idx * 0.04}s`;
                
                let stTxt = st;
                if (st === 'Aguardando Pagamento') stTxt = 'QUASE SEU ✨';
                
                let countdownHtml = "";
                if (st === 'Aguardando Pagamento' && reservedUntil && !isExpired) {
                    const left = Math.ceil((new Date(reservedUntil) - new Date()) / 60000);
                    countdownHtml = `<div class="countdown">⏳ Expira em ${left} min</div>`;
                }

                let client = reg ? reg.cliente : (isPast ? 'Encerrado' : 'Momento Disponível');
                if (isAdmin && reg && reg.telefone) client += ` <small style="display:block; opacity:0.6;">📱 ${reg.telefone}</small>`;

                card.innerHTML = `<div class="time-label">${clock}</div><div class="slot-details"><div class="status-badge" style="color:var(--accent-main)">${stTxt}</div><div class="client-name">${client}</div>${countdownHtml}</div>`;
                card.onclick = () => onAuraSlotClick(iso, clock, st, reservedUntil);
                grid.appendChild(card);
                cur += Math.max(30, dur);
                idx++;
            }
        }

        async function onAuraSlotClick(d, t, s, rUntil) {
            if (!isAdmin) {
                if (s !== 'Livre') return;
                const r = await showAuraPrompt('Agendar seu momento', `Para reservar o horário das ${t}, preencha seus dados:`);
                if (!r) return;
                const token = Math.random().toString(36).substr(2, 5).toUpperCase();
                const exp = new Date(Date.now() + CONFIG.RESERVE_MINS * 60000).toISOString();
                await syncAuraUpdate([{ 
                    data:d, horario:t, status:'Aguardando Pagamento', cliente:r.name, 
                    telefone:r.phone, codigo:token, bookingTime:new Date().toISOString(), 
                    reservedUntil:exp, duration:cfg.duration, password:admKey 
                }]);
                await showAuraPix(r.name, d, t, token);
            } else {
                const act = await showAdmActions(t, s);
                if (act === 'lock') await syncAuraUpdate([{data:d, horario:t, status:'Bloqueado', cliente:'INDISPONÍVEL', password:admKey}]);
                if (act === 'free') await syncAuraUpdate([{data:d, horario:t, status:'Livre', password:admKey}]);
                if (act === 'man') {
                    const r = await showAuraPrompt('Admin: Agendar', 'Dados:');
                    if (r) await syncAuraUpdate([{data:d, horario:t, status:'Ocupado', cliente:r.name, telefone:r.phone, duration:r.dur, password:admKey}]);
                }
            }
        }

        async function syncAuraUpdate(up) {
            try {
                await fetch(CONFIG.API_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({updates:up, password:admKey}) });
                await new Promise(r => setTimeout(r, 2000));
                await init();
            } catch(e) {}
        }

        function showAuraPrompt(ttl, desc) {
            return new Promise(res => {
                setSheet(ttl, desc);
                let h = `<input id="iN" placeholder="Seu Nome" class="aura-input"><input id="iP" placeholder="Seu WhatsApp" class="aura-input">`;
                if (isAdmin) h += `<input id="iD" type="number" value="${cfg.duration}" class="aura-input">`;
                document.getElementById('mBody').innerHTML = h;
                document.getElementById('mActions').innerHTML = `<button class="aura-btn aura-btn-secondary" id="bC">Voltar</button><button class="aura-btn aura-btn-primary" id="bO">Avançar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                document.getElementById('bO').onclick = () => {
                    const n = document.getElementById('iN').value, p = document.getElementById('iP').value;
                    const d = isAdmin ? parseInt(document.getElementById('iD').value) : cfg.duration;
                    if(n&&p) { document.getElementById('modalOverlay').classList.add('hidden'); res({name:n, phone:p, dur:d}); }
                };
                document.getElementById('bC').onclick = () => { document.getElementById('modalOverlay').classList.add('hidden'); res(null); };
            });
        }

        function showAuraPix(nome, d, t, token) {
            const dF = new Date(d+'T12:00:00').toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'2-digit'});
            setSheet('Falta pouquinho! ✨', 'Quase tudo pronto para a sua harmonia. Para garantir sua vaga, envie o comprovante clicando abaixo.');
            document.getElementById('mBody').innerHTML = `
                <div style="background:var(--bg-aura); padding:25px; border-radius:30px; text-align:center; margin-bottom:20px; border: 1px dashed var(--accent-main);">
                    <p style="font-size:0.6rem; letter-spacing:2px; font-weight:700; color:var(--accent-main); margin-bottom:10px;">CHAVE PIX (CELULAR)</p>
                    <p style="font-size:1.6rem; font-weight:700;">${CONFIG.PIX_KEY}</p>
                    <p style="font-size:0.8rem; margin-top:5px;">${CONFIG.PIX_BANK} | ${CONFIG.PIX_HOLDER}</p>
                    <button class="aura-btn" style="margin-top:20px; height:50px; padding:0;" onclick="navigator.clipboard.writeText('${CONFIG.PIX_KEY}'); alert('Copiado!')">Copiar Chave</button>
                </div>
                <div style="text-align:center; padding:15px; background:rgba(155,158,237,0.05); border-radius:20px;">
                    <p style="font-size:0.8rem;">Agendamento de <b>${nome}</b></p>
                    <p style="font-size:0.8rem;">${dF} às ${t}</p>
                    <p style="font-size:0.6rem; font-weight:700; color:var(--accent-main); margin-top:5px;">Código: ${token}</p>
                </div>
                <a href="https://wa.me/${CONFIG.WA_PHONE}?text=Olá Camila! Acabei de agendar meu momento pelo site ([Nome: ${nome}]). Escolhi ${dF} às ${t}. Estou enviando o comprovante do PIX para confirmar. Código: ${token}. ✨" target="_blank" class="wa-btn">Enviar Comprovante</a>
            `;
            document.getElementById('mActions').innerHTML = `<button class="aura-btn aura-btn-secondary" onclick="document.getElementById('modalOverlay').classList.add('hidden')">Fechar</button>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        async function doDashAuth() {
            const p = prompt('Senha do Painel:');
            if (p) { admKey = p; init(); }
        }

        function showAdmActions(t, s) {
            return new Promise(res => {
                setSheet('Gestão de Horário', t);
                document.getElementById('mBody').innerHTML = `<button class="aura-btn aura-btn-primary" onclick="done('man')">Agendar Manual</button><button class="aura-btn aura-btn-secondary" style="margin-top:15px;" onclick="done('${s==='Livre'?'lock':'free'}')">${s==='Livre'?'Bloquear':'Liberar'}</button>`;
                document.getElementById('mActions').innerHTML = `<button class="aura-btn aura-btn-secondary" style="margin-top:20px;" onclick="done(null)">Voltar</button>`;
                document.getElementById('modalOverlay').classList.remove('hidden');
                window.done = (v) => { document.getElementById('modalOverlay').classList.add('hidden'); res(v); };
            });
        }

        function openAuraConfig() {
            setSheet('Ajustes do Painel', 'Expediente e Duração padrão');
            document.getElementById('mBody').innerHTML = `<div style="display:flex; gap:10px;"><input id="aS" value="${cfg.start}" class="aura-input"><input id="aE" value="${cfg.end}" class="aura-input"></div><select id="aD" class="aura-input"><option value="30" ${cfg.duration==30?'selected':''}>30 min</option><option value="60" ${cfg.duration==60?'selected':''}>1 hora</option><option value="90" ${cfg.duration==90?'selected':''}>1h 30m</option></select>`;
            document.getElementById('mActions').innerHTML = `<button class="aura-btn aura-btn-primary" id="aSv">Salvar</button>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('aSv').onclick = async () => {
                const s = document.getElementById('aS').value, e = document.getElementById('aE').value, d = parseInt(document.getElementById('aD').value);
                await syncAuraUpdate([{ action:"update_config", config:{start:s, end:e, duration:d}, password:admKey }]);
                document.getElementById('modalOverlay').classList.add('hidden');
            };
        }

        function setSheet(t, d) { document.getElementById('mTitle').textContent = t; document.getElementById('mDesc').textContent = d; document.getElementById('mBody').innerHTML = ''; }

        window.onload = () => {
            init();
            setInterval(() => { if (currentDay) renderGrid(currentDay); }, 60000); // Auto-refresh timers
        };
    </script>
</body>
</html>
