<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOOK DESIGNER | Studio de Cílios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #F2D9D9;
            --rose: #C4848A;
            --deep-rose: #8B4F55;
            --gold: #C9A86C;
            --gold-light: #E8D5B0;
            --ink: #2A2020;
            --ink-soft: #5C4F4F;
            --cream: #FAF6F1;
            --cream-dark: #F0E8E0;
            --glass: rgba(255,255,255,0.55);
            --glass-border: rgba(201,168,108,0.25);
            --shadow: 0 8px 40px rgba(42,32,32,0.08);
            --shadow-deep: 0 20px 60px rgba(42,32,32,0.15);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --st-livre: #8BB894;
            --st-aguard: #C9A86C;
            --st-ocupado: #C4848A;
            --st-block: #B0A8A8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 10% 0%, rgba(242,217,217,0.6) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(201,168,108,0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* INTRO */
        #intro {
            position: fixed; inset: 0;
            background: var(--ink);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 12px;
            transition: opacity 1.4s var(--ease), visibility 1.4s;
        }
        #intro.out { opacity: 0; visibility: hidden; }
        .intro-eye {
            font-size: 2.5rem;
            animation: eyeBlink 3s ease-in-out infinite;
        }
        @keyframes eyeBlink {
            0%,100% { opacity: 1; transform: scaleY(1); }
            48% { opacity: 1; transform: scaleY(1); }
            50% { opacity: 0.2; transform: scaleY(0.1); }
            52% { opacity: 1; transform: scaleY(1); }
        }
        .intro-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 10px;
            color: var(--gold);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1.2s 0.5s var(--ease) forwards;
        }
        .intro-sub {
            font-size: 0.6rem;
            letter-spacing: 6px;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1.2s 0.9s var(--ease) forwards;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ADMIN BADGE */
        body.admin-on::after {
            content: "PAINEL ADMINISTRATIVO ATIVO";
            position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(90deg, var(--deep-rose), var(--gold), var(--deep-rose));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
            color: white; text-align: center;
            font-size: 0.5rem; letter-spacing: 4px; padding: 5px;
            z-index: 8000;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* APP */
        .app { max-width: 480px; margin: 0 auto; padding: 0 20px 160px; position: relative; z-index: 1; }

        /* HEADER */
        header {
            padding: 48px 0 32px;
            text-align: center;
            position: relative;
        }
        .logo-lash {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.55rem;
            letter-spacing: 8px;
            color: var(--rose);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            opacity: 0;
            animation: fadeUp 1s 3.5s var(--ease) forwards;
        }
        .logo-main {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: var(--ink);
            line-height: 1;
            opacity: 0;
            animation: fadeUp 1s 3.7s var(--ease) forwards;
        }
        .logo-main strong { font-weight: 600; color: var(--rose); }
        .logo-dot {
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            display: inline-block;
            margin: 0 4px;
            vertical-align: middle;
        }
        #adminKey {
            position: absolute; right: 0; top: 48px;
            width: 36px; height: 36px;
            cursor: pointer; opacity: 0.08;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            transition: opacity 0.3s;
        }
        #adminKey:hover { opacity: 0.3; }

        /* SECTION LABEL */
        .section-label {
            font-size: 0.5rem;
            letter-spacing: 5px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1s 4s var(--ease) forwards;
        }

        /* DAY PICKER */
        .day-scroller {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 0 24px;
            scrollbar-width: none;
            opacity: 0;
            animation: fadeUp 1s 4.2s var(--ease) forwards;
        }
        .day-scroller::-webkit-scrollbar { display: none; }

        .day-pill {
            min-width: 64px;
            height: 88px;
            border-radius: 20px;
            background: white;
            border: 1.5px solid rgba(196,132,138,0.15);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.5s var(--ease);
            box-shadow: 0 4px 20px rgba(42,32,32,0.05);
            position: relative;
            overflow: hidden;
        }
        .day-pill::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--rose), var(--deep-rose));
            opacity: 0;
            transition: opacity 0.5s var(--ease);
        }
        .day-pill.active {
            transform: translateY(-8px) scale(1.08);
            border-color: var(--rose);
            box-shadow: 0 16px 40px rgba(196,132,138,0.3);
        }
        .day-pill.active::before { opacity: 1; }
        .day-pill .dw, .day-pill .dm {
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ink-soft);
            position: relative; z-index: 1;
            transition: color 0.3s;
        }
        .day-pill.active .dw, .day-pill.active .dm { color: rgba(255,255,255,0.75); }
        .day-pill .dn {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--ink);
            position: relative; z-index: 1;
            transition: color 0.3s;
            line-height: 1;
        }
        .day-pill.active .dn { color: white; }

        /* GRID */
        #gridSection { display: none; }
        #gridSection.vis { display: block; }

        .grid-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 4px 24px;
        }
        .grid-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
        }
        .back-btn {
            font-size: 0.55rem;
            letter-spacing: 3px;
            font-weight: 700;
            color: var(--rose);
            text-transform: uppercase;
            cursor: pointer;
            background: none; border: none;
        }

        /* ADMIN: Multi-select bar */
        #multiSelectBar {
            display: none;
            align-items: center; justify-content: space-between;
            background: var(--ink);
            color: white;
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        #multiSelectBar.vis { display: flex; }
        #multiSelectBar button {
            background: var(--rose);
            color: white; border: none;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
        }
        #multiSelectBar .cancel-sel {
            background: transparent;
            color: rgba(255,255,255,0.5);
            padding: 8px;
        }

        /* SLOT CARDS */
        .slots { display: flex; flex-direction: column; gap: 12px; }

        .slot-card {
            background: white;
            border-radius: 20px;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.4s var(--ease);
            border: 1.5px solid transparent;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: cardIn 0.5s var(--ease) backwards;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .slot-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-deep); }
        .slot-card.past { opacity: 0.3; pointer-events: none; }
        .slot-card.selected { border-color: var(--rose); background: rgba(196,132,138,0.05); }

        .slot-check {
            display: none;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid var(--rose);
            background: var(--rose);
            align-items: center; justify-content: center;
            color: white;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        body.admin-on .slot-check { display: flex; }
        .slot-card.selected .slot-check { background: var(--rose); }
        .slot-card:not(.selected) .slot-check { background: transparent; }

        .slot-pip {
            width: 4px;
            align-self: stretch;
            border-radius: 4px;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .slot-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--ink);
            min-width: 58px;
            flex-shrink: 0;
        }

        .slot-info { flex: 1; min-width: 0; }
        .slot-status {
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .slot-client {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .slot-dur {
            font-size: 0.65rem;
            color: var(--ink-soft);
            margin-top: 2px;
        }
        .slot-badge {
            font-size: 0.55rem;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* COUNTDOWN */
        .countdown-pill {
            display: inline-block;
            background: linear-gradient(90deg, var(--gold), var(--rose));
            color: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.55rem;
            font-weight: 700;
            margin-top: 6px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }

        /* ADMIN LOG BADGE */
        .log-expired {
            display: inline-block;
            background: rgba(139,75,85,0.1);
            color: var(--deep-rose);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.5rem;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* NAV */
        .nav-float {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 50px;
            padding: 14px 28px;
            display: flex;
            gap: 4px;
            box-shadow: 0 8px 40px rgba(42,32,32,0.15);
            z-index: 6000;
            border: 1px solid rgba(196,132,138,0.15);
            opacity: 0;
            animation: fadeUp 1s 4.5s var(--ease) forwards;
        }
        .nav-btn {
            background: none; border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ink);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: var(--cream-dark); }
        .nav-btn.primary {
            background: linear-gradient(135deg, var(--rose), var(--deep-rose));
            color: white;
        }
        #adminNav { display: none; }
        body.admin-on #adminNav { display: flex; gap: 4px; }
        body.admin-on #userNav { display: none; }

        /* LOG PANEL (ADMIN) */
        #logPanel {
            margin-top: 24px;
            display: none;
        }
        body.admin-on #logPanel { display: block; }
        .log-title {
            font-size: 0.5rem;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .log-entry {
            background: white;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 8px;
            border-left: 3px solid var(--rose);
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--ink-soft);
        }
        .log-entry strong { color: var(--ink); display: block; margin-bottom: 2px; }
        .log-entry .log-meta { font-size: 0.6rem; color: var(--rose); margin-top: 4px; }

        /* SHEET */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(42,32,32,0.4);
            backdrop-filter: blur(12px);
            z-index: 8000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.vis { display: flex; }

        .sheet {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 32px 32px 0 0;
            padding: 36px 32px 48px;
            animation: sheetUp 0.6s var(--ease);
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .sheet-handle {
            width: 40px; height: 4px;
            background: var(--cream-dark);
            border-radius: 4px;
            margin: 0 auto 28px;
        }

        .sheet-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 4px;
        }
        .sheet-sub {
            font-size: 0.8rem;
            color: var(--ink-soft);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .field-label {
            font-size: 0.55rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .inp {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1.5px solid var(--cream-dark);
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 16px;
            outline: none;
            transition: all 0.3s;
            color: var(--ink);
        }
        .inp:focus { border-color: var(--rose); background: white; }

        .dur-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .dur-opt {
            padding: 12px;
            border-radius: 12px;
            border: 1.5px solid var(--cream-dark);
            text-align: center;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.3s;
            background: var(--cream);
        }
        .dur-opt.sel { border-color: var(--rose); background: rgba(196,132,138,0.08); color: var(--rose); font-weight: 700; }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--rose) 0%, var(--deep-rose) 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(139,79,85,0.3);
            margin-bottom: 12px;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: var(--cream-dark); color: var(--ink); }
        .btn-danger { background: linear-gradient(135deg, #C94848, #8B2020); color: white; box-shadow: 0 8px 24px rgba(139,32,32,0.3); margin-bottom: 12px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #A07840); color: white; box-shadow: 0 8px 24px rgba(160,120,64,0.3); margin-bottom: 12px; }

        /* PIX BOX */
        .pix-box {
            background: var(--cream);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            border: 1.5px dashed var(--gold);
        }
        .pix-label {
            font-size: 0.5rem;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .pix-key {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 6px;
        }
        .pix-holder { font-size: 0.8rem; color: var(--ink-soft); }

        .wa-link {
            display: block;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 16px;
            box-shadow: 0 8px 24px rgba(37,211,102,0.3);
            transition: all 0.3s;
        }
        .wa-link:active { transform: scale(0.98); }

        .info-box {
            background: rgba(201,168,108,0.1);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 20px;
            border-left: 3px solid var(--gold);
            font-size: 0.78rem;
            line-height: 1.6;
            color: var(--ink-soft);
        }

        /* BOOKING SUMMARY */
        .booking-sum {
            background: var(--cream);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .booking-sum p { font-size: 0.8rem; color: var(--ink-soft); margin-bottom: 4px; }
        .booking-sum p strong { color: var(--ink); }
        .booking-sum .token {
            display: inline-block;
            background: var(--ink);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 6px;
        }

        /* ADMIN ACTIONS */
        .admin-action-grid {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        /* CONFIG */
        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
    </style>
</head>
<body>

<div id="intro">
    <div class="intro-eye">👁️</div>
    <div class="intro-title">Look Designer</div>
    <div class="intro-sub">Studio de Cílios · Agende seu olhar</div>
</div>

<div class="app">
    <header>
        <div id="adminKey" onclick="promptAdmin()" title="Acesso admin">🔑</div>
        <span class="logo-lash">Studio de Cílios</span>
        <div class="logo-main">LOOK<span class="logo-dot"></span><strong>DESIGNER</strong></div>
    </header>

    <div class="section-label">✦ Escolha sua data ✦</div>
    <div class="day-scroller" id="dayScroller"></div>

    <section id="gridSection">
        <div class="grid-head">
            <div class="grid-date" id="gridDate"></div>
            <button class="back-btn" onclick="closeGrid()">← Voltar</button>
        </div>

        <!-- Admin multi-select bar -->
        <div id="multiSelectBar">
            <span id="selCount">0 selecionados</span>
            <div style="display:flex;gap:8px">
                <button class="cancel-sel" onclick="clearSelection()">✕</button>
                <button onclick="blockSelected()">🔒 Bloquear</button>
                <button onclick="freeSelected()">🔓 Liberar</button>
            </div>
        </div>

        <div class="slots" id="slotsContainer"></div>

        <!-- ADMIN LOG -->
        <div id="logPanel">
            <div class="log-title">✦ Registros do Sistema</div>
            <div id="logEntries"></div>
        </div>
    </section>
</div>

<!-- NAV -->
<div class="nav-float">
    <div id="userNav">
        <button class="nav-btn" onclick="scrollToTop()">Início</button>
    </div>
    <div id="adminNav">
        <button class="nav-btn" onclick="openConfig()">⚙ Ajustes</button>
        <button class="nav-btn primary" onclick="syncData()">↻ Sync</button>
        <button class="nav-btn" onclick="logoutAdmin()" style="color:var(--rose)">Sair</button>
    </div>
</div>

<!-- SHEET OVERLAY -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-sub" id="sheetSub"></div>
        <div id="sheetBody"></div>
        <div id="sheetActions"></div>
    </div>
</div>

<script>
const CFG = {

    RESERVE_MIN: 20

let adminPass = "", isAdmin = false;
let currentDay = "";
let selectedSlots = new Set(); // multi-select

// ─── INTRO ───────────────────────────────────────────
setTimeout(() => document.getElementById('intro').classList.add('out'), 3500);

// ─── INIT ─────────────────────────────────────────────
async function syncData() {
    try {
        const cb = '_ld_' + Date.now();
        await new Promise((res, rej) => {
            const s = document.createElement('script');
            window[cb] = r => { delete window[cb]; s.remove(); if(r.status==='OK') res(r); else rej(); };
            s.src = `${CFG.API_URL}?pass=${encodeURIComponent(adminPass)}&_t=${Date.now()}&callback=${cb}`;
            s.onerror = rej;
            document.body.appendChild(s);
            setTimeout(rej, 10000);
        }).then(r => {
            db = r.agenda || [];
            srvCfg = r.config || srvCfg;
            isAdmin = !!r.isAdmin;
            if(isAdmin) {
                document.body.classList.add('admin-on');
            } else {
                document.body.classList.remove('admin-on');
            }
            renderDays();
            if(currentDay) renderGrid(currentDay);
        });
    } catch(e) {}
}

// ─── DAYS ─────────────────────────────────────────────
function renderDays() {
    const c = document.getElementById('dayScroller');
    c.innerHTML = '';
    const now = new Date();
    for(let i=0;i<14;i++) {
        const d = new Date(); d.setDate(now.getDate()+i);
        const iso = d.toISOString().split('T')[0];
        const el = document.createElement('div');
        el.className = 'day-pill' + (iso===currentDay?' active':'');
        el.onclick = () => selectDay(iso);
        const dw = d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','').toUpperCase();
        const dm = d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase();
        el.innerHTML = `<div class="dw">${dw}</div><div class="dn">${d.getDate()}</div><div class="dm">${dm}</div>`;
        c.appendChild(el);
    }
}

function selectDay(iso) {
    currentDay = iso;
    clearSelection();
    renderDays();
    const d = new Date(iso+'T12:00:00');
    document.getElementById('gridDate').textContent =
        d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})
         .replace(/^\w/,c=>c.toUpperCase());
    document.getElementById('gridSection').classList.add('vis');
    renderGrid(iso);
}

function closeGrid() {
    currentDay = '';
    clearSelection();
    document.getElementById('gridSection').classList.remove('vis');
    renderDays();
}

function scrollToTop() { window.scrollTo({top:0,behavior:'smooth'}); }

// ─── GRID ──────────────────────────────────────────────
function renderGrid(iso) {
    const container = document.getElementById('slotsContainer');
    container.innerHTML = '';
    const logContainer = document.getElementById('logEntries');
    logContainer.innerHTML = '';

    const now = new Date();
    const todayIso = now.toISOString().split('T')[0];
    const curMins = now.getHours()*60 + now.getMinutes();

    const [sH,sM] = srvCfg.start.split(':').map(Number);
    const [eH,eM] = srvCfg.end.split(':').map(Number);
    let cur = sH*60+sM, end = eH*60+eM;
    let idx = 0;

    const logs = [];

    while(cur < end) {
        const hh = String(Math.floor(cur/60)).padStart(2,'0');
        const mm = String(cur%60).padStart(2,'0');
        const clock = `${hh}:${mm}`;
        const isPast = (iso < todayIso) || (iso === todayIso && cur < curMins);

        const reg = db.find(r =>
            String(r.data).substring(0,10)===iso &&
            String(r.horario).substring(0,5)===clock
        );

        let st = reg ? reg.status : 'Livre';
        let durMin = reg ? parseInt(reg.duration||srvCfg.duration) : srvCfg.duration;
        const reservedUntil = reg ? reg.reservedUntil : null;
        const logMsg = reg ? reg.log : null;

        // Expired check
        let isExpired = false;
        if(st==='Aguardando Pagamento' && reservedUntil) {
            if(new Date() > new Date(reservedUntil)) { isExpired = true; }
        }

        // Non-admin: expired => show as Livre
        if(st==='Aguardando Pagamento' && isExpired && !isAdmin) st = 'Livre';

        // Auto-fit duration against next occupied slot
        if(st==='Livre') {
            const nextOcc = db
                .filter(r => String(r.data).substring(0,10)===iso && r.status!=='Livre')
                .map(r => { const [h,m]=r.horario.split(':').map(Number); return h*60+m; })
                .filter(m=>m>cur).sort((a,b)=>a-b)[0];
            if(nextOcc) {
                const gap = nextOcc - cur;
                if(gap < durMin) durMin = gap;
            }
        }

        // Color pip
        const pipColor = {
            'Livre': 'var(--st-livre)',
            'Aguardando Pagamento': 'var(--st-aguard)',
            'Ocupado': 'var(--st-ocupado)',
            'Bloqueado': 'var(--st-block)'
        }[st] || 'var(--st-block)';

        // Countdown
        let countdownHtml = '';
        if(st==='Aguardando Pagamento' && reservedUntil && !isExpired) {
            const leftMs = new Date(reservedUntil) - new Date();
            const leftMin = Math.ceil(leftMs/60000);
            countdownHtml = `<div class="countdown-pill">⏳ Reservado por mais ${leftMin} min</div>`;
        }

        // Admin: show expired log
        let expiredHtml = '';
        if(isAdmin && isExpired && logMsg) {
            expiredHtml = `<div class="log-expired">⚠ Expirado — veja log</div>`;
            logs.push({ time: clock, msg: logMsg, client: reg.cliente, phone: reg.telefone, token: reg.codigo });
        }

        const durLabel = durMin >= 60
            ? `${Math.floor(durMin/60)}h${durMin%60>0?' '+durMin%60+'min':''}`
            : `${durMin} min`;

        const stLabels = {
            'Livre': 'DISPONÍVEL',
            'Aguardando Pagamento': isExpired ? (isAdmin ? 'EXPIRADO' : 'DISPONÍVEL') : 'AGUARDANDO',
            'Ocupado': 'OCUPADO',
            'Bloqueado': 'BLOQUEADO'
        };
        const stLabel = stLabels[st] || st;

        let clientName = 'Horário disponível ✨';
        if(st==='Ocupado'||st==='Aguardando Pagamento') clientName = reg.cliente || '—';
        if(st==='Bloqueado') clientName = 'Indisponível';
        if(isExpired && !isAdmin) clientName = 'Horário disponível ✨';

        // Admin: show phone too
        let extra = '';
        if(isAdmin && reg && reg.telefone) extra = `<div class="slot-dur">📱 ${reg.telefone}</div>`;

        const card = document.createElement('div');
        card.dataset.time = clock;
        card.dataset.status = st;
        card.style.animationDelay = `${idx*0.04}s`;
        card.className = 'slot-card' + (isPast && !isAdmin?' past':'');
        card.onclick = () => handleSlotClick(card, iso, clock, st, reservedUntil, reg);

        card.innerHTML = `
            <div class="slot-check" data-chk>✓</div>
            <div class="slot-pip" style="background:${pipColor}"></div>
            <div class="slot-time">${clock}</div>
            <div class="slot-info">
                <div class="slot-status" style="color:${pipColor}">${stLabel}</div>
                <div class="slot-client">${clientName}</div>
                <div class="slot-dur">${durLabel}</div>
                ${extra}
                ${countdownHtml}
                ${expiredHtml}
            </div>
        `;

        container.appendChild(card);
        cur += Math.max(30, durMin);
        idx++;
    }

    // Render logs
    if(isAdmin && logs.length > 0) {
        logs.forEach(l => {
            const e = document.createElement('div');
            e.className = 'log-entry';
            e.innerHTML = `<strong>⏱ ${l.time} — Reserva Não Confirmada</strong>${l.msg}<div class="log-meta">Token: ${l.token} · ${l.phone}</div>`;
            logContainer.appendChild(e);
        });
    }
}

// ─── SLOT CLICK ────────────────────────────────────────
function handleSlotClick(card, iso, clock, st, rUntil, reg) {
    if(isAdmin) {
        // Multi-select mode
        const key = `${iso}|${clock}`;
        if(selectedSlots.has(key)) {
            selectedSlots.delete(key);
            card.classList.remove('selected');
        } else {
            selectedSlots.add(key);
            card.classList.add('selected');
        }
        updateMultiBar();

        // If only 1 selected, show detail modal after short delay
        if(selectedSlots.size === 1) {
            clearTimeout(window._singleTimer);
            window._singleTimer = setTimeout(() => {
                if(selectedSlots.size === 1) {
                    clearSelection();
                    showAdminSlotSheet(iso, clock, st, reg);
                }
            }, 400);
        } else {
            clearTimeout(window._singleTimer);
        }
    } else {
        if(st !== 'Livre') return;
        showBookingSheet(iso, clock);
    }
}

function updateMultiBar() {
    const bar = document.getElementById('multiSelectBar');
    const n = selectedSlots.size;
    if(n > 0) {
        bar.classList.add('vis');
        document.getElementById('selCount').textContent = `${n} horário${n>1?'s':''} selecionado${n>1?'s':''}`;
    } else {
        bar.classList.remove('vis');
    }
}

function clearSelection() {
    selectedSlots.clear();
    document.querySelectorAll('.slot-card.selected').forEach(c=>c.classList.remove('selected'));
    updateMultiBar();
}

async function blockSelected() {
    if(!selectedSlots.size) return;
    if(!confirm(`Bloquear ${selectedSlots.size} horário(s)?`)) return;
    const updates = [...selectedSlots].map(k => {
        const [d,t] = k.split('|');
        return {data:d,horario:t,status:'Bloqueado',cliente:'INDISPONÍVEL',password:adminPass};
    });
    clearSelection();
    await postUpdates(updates);
}

async function freeSelected() {
    if(!selectedSlots.size) return;
    if(!confirm(`Liberar ${selectedSlots.size} horário(s)?`)) return;
    const updates = [...selectedSlots].map(k => {
        const [d,t] = k.split('|');
        return {data:d,horario:t,status:'Livre',cliente:'',password:adminPass};
    });
    clearSelection();
    await postUpdates(updates);
}

// ─── BOOKING SHEET (CLIENTE) ───────────────────────────
function showBookingSheet(iso, clock) {
    const d = new Date(iso+'T12:00:00');
    const df = d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
    openSheet('Agendar seu olhar ✨', `Preencha seus dados para reservar o horário das ${clock}.`);
    document.getElementById('sheetBody').innerHTML = `
        <div class="info-box">
            Você terá <strong>${CFG.RESERVE_MIN} minutos</strong> para enviar o comprovante do PIX e garantir sua vaga.
        </div>
        <label class="field-label">Seu nome</label>
        <input id="bName" class="inp" placeholder="Nome completo">
        <label class="field-label">WhatsApp</label>
        <input id="bPhone" class="inp" placeholder="(00) 00000-0000" type="tel">
    `;
    document.getElementById('sheetActions').innerHTML = `
        <button class="btn btn-primary" onclick="confirmBooking('${iso}','${clock}','${df}')">Reservar meu horário →</button>
        <button class="btn btn-secondary" onclick="closeSheet()">Voltar</button>
    `;
}

async function confirmBooking(iso, clock, df) {
    const name = document.getElementById('bName').value.trim();
    const phone = document.getElementById('bPhone').value.trim();
    if(!name||!phone) { alert('Preencha todos os campos.'); return; }

    const token = Math.random().toString(36).substring(2,7).toUpperCase();
    const exp = new Date(Date.now() + CFG.RESERVE_MIN*60000).toISOString();
    const bTime = new Date().toISOString();

    await postUpdates([{
        data:iso, horario:clock, status:'Aguardando Pagamento',
        cliente:name, telefone:phone, codigo:token,
        bookingTime:bTime, reservedUntil:exp,
        duration:srvCfg.duration, password:adminPass
    }]);

    showPixSheet(name, phone, iso, clock, df, token, exp);
}

function showPixSheet(name, phone, iso, clock, df, token, exp) {
    const leftMin = CFG.RESERVE_MIN;
    const waText = encodeURIComponent(
        `Olá, Camila! 💗\n\nAcabei de reservar meu horário pelo site da Look Designer.\n\n` +
        `📌 *Dados do agendamento:*\n` +
        `• Nome: ${name}\n` +
        `• Data: ${df}\n` +
        `• Horário: ${clock}\n` +
        `• Código da reserva: *${token}*\n\n` +
        `💰 *PIX enviado para:*\n` +
        `• Titular: ${CFG.PIX_HOLDER}\n` +
        `• Chave PIX: ${CFG.PIX_KEY} (${CFG.PIX_BANK})\n\n` +
        `Segue em anexo o comprovante! 🧾\n` +
        `Estou aguardando a confirmação dentro dos ${leftMin} minutos. ✨`
    );

    openSheet('Quase lá! 💕', 'Sua vaga está reservada. Agora envie o PIX e mande o comprovante no WhatsApp para confirmar.');
    document.getElementById('sheetBody').innerHTML = `
        <div class="pix-box">
            <div class="pix-label">Chave PIX (celular)</div>
            <div class="pix-key">${CFG.PIX_KEY}</div>
            <div class="pix-holder">${CFG.PIX_BANK} · ${CFG.PIX_HOLDER}</div>
            <button class="btn btn-secondary" style="margin-top:16px;padding:12px;" onclick="navigator.clipboard.writeText('${CFG.PIX_KEY}').then(()=>alert('Chave copiada!'))">📋 Copiar Chave</button>
        </div>
        <div class="booking-sum">
            <p><strong>${name}</strong> · ${df} às ${clock}</p>
            <p>WhatsApp: ${phone}</p>
            <div class="token">${token}</div>
        </div>
        <div class="info-box">
            ⏳ Você tem <strong>${leftMin} minutos</strong> para enviar o comprovante. Após esse prazo, a vaga é liberada automaticamente.
        </div>
        <a href="https://wa.me/${CFG.WA}?text=${waText}" target="_blank" class="wa-link">💬 Enviar Comprovante no WhatsApp</a>
    `;
    document.getElementById('sheetActions').innerHTML = `
        <button class="btn btn-secondary" onclick="closeSheet()" style="margin-top:16px;">Fechar</button>
    `;
}

// ─── ADMIN SLOT SHEET ──────────────────────────────────
function showAdminSlotSheet(iso, clock, st, reg) {
    const durOpts = [30,45,60,75,90,120].map(d =>
        `<div class="dur-opt${(reg&&parseInt(reg.duration||srvCfg.duration)===d)||(!reg&&srvCfg.duration===d)?' sel':''}" onclick="selectDur(this,${d})">${d>=60?Math.floor(d/60)+'h'+(d%60>0?d%60:''):''+d+'min'}</div>`
    ).join('');

    openSheet(`Gestão · ${clock}`, `Status atual: ${st}`);
    document.getElementById('sheetBody').innerHTML = `
        <div class="admin-action-grid">
            ${st!=='Bloqueado' ? `<button class="btn btn-danger" onclick="adminAction('${iso}','${clock}','block')">🔒 Bloquear este horário</button>` : ''}
            ${st==='Bloqueado'||st==='Ocupado' ? `<button class="btn btn-gold" onclick="adminAction('${iso}','${clock}','free')">🔓 Liberar horário</button>` : ''}
        </div>
        <label class="field-label">Agendar manualmente</label>
        <input id="aName" class="inp" placeholder="Nome do cliente" value="${reg&&st==='Ocupado'?reg.cliente:''}">
        <input id="aPhone" class="inp" placeholder="WhatsApp do cliente" type="tel" value="${reg&&reg.telefone?reg.telefone:''}">
        <label class="field-label">Duração do procedimento</label>
        <div class="dur-grid" id="durGrid">${durOpts}</div>
    `;
    document.getElementById('sheetActions').innerHTML = `
        <button class="btn btn-primary" onclick="adminManual('${iso}','${clock}')">✓ Salvar agendamento</button>
        <button class="btn btn-secondary" onclick="closeSheet()">Voltar</button>
    `;
}

let selectedDur = 0;
function selectDur(el, val) {
    document.querySelectorAll('.dur-opt').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');
    selectedDur = val;
}

async function adminAction(iso, clock, action) {
    closeSheet();
    if(action==='block') {
        await postUpdates([{data:iso,horario:clock,status:'Bloqueado',cliente:'INDISPONÍVEL',password:adminPass}]);
    } else {
        await postUpdates([{data:iso,horario:clock,status:'Livre',cliente:'',password:adminPass}]);
    }
}

async function adminManual(iso, clock) {
    const name = document.getElementById('aName').value.trim();
    const phone = document.getElementById('aPhone').value.trim();
    if(!name||!phone) { alert('Preencha nome e WhatsApp.'); return; }
    const dur = selectedDur || srvCfg.duration;
    closeSheet();
    await postUpdates([{
        data:iso,horario:clock,status:'Ocupado',
        cliente:name,telefone:phone,duration:dur,password:adminPass
    }]);
}

// ─── CONFIG SHEET ──────────────────────────────────────
function openConfig() {
    openSheet('Configurações', 'Ajuste o expediente e a duração padrão dos atendimentos.');
    document.getElementById('sheetBody').innerHTML = `
        <label class="field-label">Horário de início</label>
        <input id="cfgS" class="inp" value="${srvCfg.start}" placeholder="08:00">
        <label class="field-label">Horário de término</label>
        <input id="cfgE" class="inp" value="${srvCfg.end}" placeholder="20:00">
        <label class="field-label">Duração padrão (minutos)</label>
        <input id="cfgD" class="inp" type="number" value="${srvCfg.duration}" min="30" step="15">
    `;
    document.getElementById('sheetActions').innerHTML = `
        <button class="btn btn-primary" onclick="saveConfig()">Salvar configurações</button>
        <button class="btn btn-secondary" onclick="closeSheet()">Cancelar</button>
    `;
}

async function saveConfig() {
    const s = document.getElementById('cfgS').value;
    const e = document.getElementById('cfgE').value;
    const d = parseInt(document.getElementById('cfgD').value);
    closeSheet();
    await postUpdates([{action:'update_config',config:{start:s,end:e,duration:d},password:adminPass}]);
}

// ─── ADMIN AUTH ────────────────────────────────────────
function promptAdmin() {
    const p = prompt('Senha do painel administrativo:');
    if(p) { adminPass = p; syncData(); }
}

function logoutAdmin() {
    adminPass = '';
    isAdmin = false;
    document.body.classList.remove('admin-on');
    clearSelection();
    if(currentDay) renderGrid(currentDay);
}

// ─── POST ──────────────────────────────────────────────
async function postUpdates(updates) {
    try {
        const body = Array.isArray(updates) && updates[0].action
            ? JSON.stringify(updates[0])
            : JSON.stringify({updates});
        await fetch(CFG.API_URL, {
            method:'POST', mode:'no-cors',
            body: Array.isArray(updates) && updates[0].action ? body : JSON.stringify({updates})
        });
        await new Promise(r=>setTimeout(r,2000));
        await syncData();
    } catch(e) {}
}

// ─── SHEET HELPERS ─────────────────────────────────────
function openSheet(title, sub) {
    document.getElementById('sheetTitle').textContent = title;
    document.getElementById('sheetSub').textContent = sub;
    document.getElementById('sheetBody').innerHTML = '';
    document.getElementById('sheetActions').innerHTML = '';
    document.getElementById('overlay').classList.add('vis');
}

function closeSheet() { document.getElementById('overlay').classList.remove('vis'); }

function handleOverlayClick(e) {
    if(e.target === document.getElementById('overlay')) closeSheet();
}

// ─── BOOT ──────────────────────────────────────────────
window.onload = () => {
    syncData();
    renderDays();
    setInterval(() => { if(currentDay) renderGrid(currentDay); }, 60000);
};
</script>
